            })()}
          </>
        )}
        {sec==="archived"&&(
          <>
            <button onClick={()=>setSec("overview")} style={{background:"transparent",border:"none",color:C.textSub,fontSize:"0.85rem",fontWeight:600,cursor:"pointer",padding:"0 0 8px",display:"flex",alignItems:"center",gap:"4px"}}>‹ Back to Overview</button>
            <SLabel mt="0">Archived Crops ({archived.length})</SLabel>
            {archived.length===0&&<div style={{textAlign:"center",padding:"2rem",color:C.textFaint,fontStyle:"italic"}}>No archived crops.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {[...archived].sort((a,b)=>{
                const aDate=a.stageHistory?.[a.stageHistory.length-1]?.date||a.seedDate||"";
                const bDate=b.stageHistory?.[b.stageHistory.length-1]?.date||b.seedDate||"";
                return bDate.localeCompare(aDate);
              }).map(c=>{
                const acc=cropAccent(c.name);
                const isLost=c.stage==="Lost";
                const lastStageDate=c.stageHistory?.[c.stageHistory.length-1]?.date;
                const ht=harvestTotal(c);
                return(
                  <div key={c.id} style={{background:"white",borderRadius:"12px",padding:"14px",border:`1px solid ${isLost?"#fca5a5":C.border}`,borderLeft:`4px solid ${acc.from}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",color:C.textFaint,textTransform:"uppercase"}}>{c.name}</div>
                        <div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"1rem",color:C.text,lineHeight:1.2}}>{c.variety||<span style={{fontStyle:"normal",fontFamily:F.sans,color:C.textFaint,fontSize:"0.88rem"}}>No variety</span>}</div>
                      </div>
                      <Pill bg={isLost?"#fef2f2":"#f3f4f6"} color={isLost?"#991b1b":"#6b7280"}>{isLost?"🪦 Lost":"✅ Done"}</Pill>
                    </div>
                    <div style={{fontSize:"0.78rem",color:C.textSub,marginBottom:"8px"}}>
                      📍 {c.location}
                      {ht&&<span> · 🌿 {ht.value} {ht.unit}</span>}
                      {lastStageDate&&<span> · {fmtDate(lastStageDate)}</span>}
                    </div>
                    <button onClick={()=>setConfirmRestore(c)} style={{background:"#f0fdf4",border:`1px solid ${C.green}`,borderRadius:"8px",padding:"6px 14px",fontSize:"0.8rem",fontWeight:700,color:C.greenDark,cursor:"pointer"}}>↺ Restore to Active</button>
                  </div>
                );
              })}
            </div>
          </>
        )}
        {sec==="harvests"&&(
          <>
            {harvestByCrop.length===0&&<div style={{textAlign:"center",padding:"2rem",color:C.textFaint,fontStyle:"italic"}}>No harvests logged yet.</div>}
            {harvestByCrop.length>0&&<><SLabel>Harvest by Crop</SLabel>{harvestByCrop.map((c,i)=><div key={i} style={{background:"white",borderRadius:"12px",padding:"14px",border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:"0.92rem",fontWeight:600,color:C.text}}>{c.name}{c.variety&&<span style={{fontWeight:400,color:C.textSub}}> · {c.variety}</span>}</div><div style={{fontSize:"0.78rem",color:C.textSub,marginTop:"2px"}}>{c.count} harvest{c.count!==1?"s":""}</div></div>{c.total&&<div style={{fontSize:"1rem",fontWeight:700,color:C.greenDark}}>{c.total.value} {c.total.unit}</div>}</div>)}</>}
            {allHarvests.length>0&&<><SLabel>Full Log</SLabel>{[...allHarvests].sort((a,b)=>b.date.localeCompare(a.date)).map((h,i)=><div key={i} style={{background:"white",borderRadius:"10px",padding:"12px 14px",borderLeft:"3px solid #8b5cf6",display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}><div style={{flex:1}}><div style={{fontSize:"0.88rem",fontWeight:600,color:C.text}}>{h.cropName}{h.variety&&<span style={{fontWeight:400,color:C.textSub}}> · {h.variety}</span>}</div>{h.amount&&<div style={{fontSize:"0.82rem",color:C.greenDark,fontWeight:600,marginTop:"2px"}}>{h.amount} {h.unit}</div>}{h.note&&<div style={{fontSize:"0.8rem",color:C.textSub,marginTop:"2px"}}>{h.note}</div>}</div><span style={{fontSize:"0.72rem",color:C.textFaint,flexShrink:0,marginTop:"2px"}}>{fmtDate(h.date)}</span></div>)}</>}
          </>
        )}
        {sec==="feeding"&&(
          <>
            {active.length===0&&<div style={{textAlign:"center",padding:"2rem",color:C.textFaint,fontStyle:"italic"}}>No active crops.</div>}
            {active.map(c=>{
              const fl=c.feedLog||[];
              const schedules=c.feedSchedules||{};
              if(fl.length===0&&Object.keys(schedules).length===0) return null;
              const overdueList=Object.entries(schedules).filter(([n,d])=>{const l=[...fl].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);});
              const acc=cropAccent(c.name);
              return(
                <div key={c.id} style={{background:"white",borderRadius:"12px",border:`1px solid ${overdueList.length>0?"#fcd34d":C.border}`,borderLeft:`4px solid ${acc.from}`,overflow:"hidden"}}>
                  <div style={{padding:"12px 14px",background:overdueList.length>0?"#fffbeb":"#fafafa",borderBottom:`1px solid ${C.border}`}}>
                    <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",color:C.textFaint,textTransform:"uppercase"}}>{c.name}</div>
                    <div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"1rem",color:C.text,lineHeight:1.2,marginTop:"2px"}}>{c.variety||<span style={{fontStyle:"normal",fontFamily:F.sans,color:C.textFaint,fontSize:"0.88rem"}}>No variety</span>}</div>
                    <div style={{fontSize:"0.72rem",color:C.textSub,marginTop:"4px"}}>{fl.length} feeding{fl.length!==1?"s":""} logged · {Object.keys(schedules).length} schedule{Object.keys(schedules).length!==1?"s":""}</div>
                  </div>
                  {Object.keys(schedules).length>0&&<div style={{padding:"10px 14px",borderBottom:fl.length>0?`1px solid ${C.border}`:"none"}}>
                    {Object.entries(schedules).map(([n,sched])=>{
                      const d=scheduleDays(sched);
                      const last=[...fl].reverse().find(f=>f.nutrient===n);
                      const od=last&&daysAgo(last.date)>=d;
                      return <div key={n} style={{fontSize:"0.78rem",color:od?"#92400e":C.greenMid,marginBottom:"3px"}}>{od?"⚠ ":"✓ "}<strong style={{color:C.text,fontWeight:600}}>{n}</strong> · every {d}d{last?` · last ${fmtDate(last.date)}`:" · never fed"}</div>;
                    })}
                  </div>}
                  {fl.length>0&&<div style={{padding:"10px 14px"}}>
                    <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.06em",color:C.textFaint,textTransform:"uppercase",marginBottom:"6px"}}>Recent</div>
                    <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                      {[...fl].reverse().slice(0,5).map((f,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:"0.8rem"}}>
                          <span style={{color:C.text,fontWeight:500}}>{f.nutrient}{f.qty&&<span style={{color:C.textSub,fontWeight:400}}> · {f.qty}</span>}{f.water&&<span style={{color:"#1d4ed8",fontWeight:400}}> · 💧 {f.water}</span>}</span>
                          <span style={{color:C.textFaint,fontSize:"0.72rem",flexShrink:0,marginLeft:"8px"}}>{fmtDate(f.date)}</span>
                        </div>
                      ))}
                      {fl.length>5&&<div style={{fontSize:"0.72rem",color:C.textFaint,fontStyle:"italic",marginTop:"2px"}}>+{fl.length-5} more</div>}
                    </div>
                  </div>}
                </div>
              );
            }).filter(Boolean)}
            {active.every(c=>(c.feedLog||[]).length===0&&Object.keys(c.feedSchedules||{}).length===0)&&<div style={{textAlign:"center",padding:"2rem",color:C.textFaint,fontStyle:"italic"}}>No feeding logged yet.</div>}
          </>
        )}
        {sec==="watering"&&(
          <>
            {active.length===0&&<div style={{textAlign:"center",padding:"2rem",color:C.textFaint,fontStyle:"italic"}}>No active crops.</div>}
            {active.map(c=>{
              const wl=c.waterLog||[];
              const last=wl.length?wl[wl.length-1]:null;
              const days=last?daysAgo(last.date):null;
              const acc=cropAccent(c.name);
              // Calculate average interval between waterings
              let avgInterval=null;
              if(wl.length>=2){
                const gaps=[];
                for(let i=1;i<wl.length;i++){
                  const g=Math.round((new Date(wl[i].date)-new Date(wl[i-1].date))/864e5);
                  if(g>0) gaps.push(g);
                }
                if(gaps.length) avgInterval=Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
              }
              return(
                <div key={c.id} style={{background:"white",borderRadius:"12px",border:`1px solid ${days!==null&&days>=3?"#93c5fd":C.border}`,borderLeft:`4px solid ${acc.from}`,overflow:"hidden"}}>
                  <div style={{padding:"12px 14px",background:days!==null&&days>=3?"#eff6ff":"#fafafa",borderBottom:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",color:C.textFaint,textTransform:"uppercase"}}>{c.name}</div>
                        <div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"1rem",color:C.text,lineHeight:1.2,marginTop:"2px"}}>{c.variety||<span style={{fontStyle:"normal",fontFamily:F.sans,color:C.textFaint,fontSize:"0.88rem"}}>No variety</span>}</div>
                      </div>
                      <span style={{fontSize:"0.72rem",fontWeight:700,color:days===null?C.textFaint:days===0?C.greenMid:days>=3?"#1d4ed8":C.textSub,whiteSpace:"nowrap"}}>{days===null?"Never":days===0?"Today":`${days}d ago`}</span>
                    </div>
                    <div style={{fontSize:"0.72rem",color:C.textSub,marginTop:"4px"}}>{wl.length} watering{wl.length!==1?"s":""} logged{avgInterval?` · avg every ${avgInterval}d`:""}</div>
                  </div>
                  {wl.length>0&&<div style={{padding:"10px 14px"}}>
                    <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.06em",color:C.textFaint,textTransform:"uppercase",marginBottom:"6px"}}>Recent</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                      {[...wl].reverse().slice(0,8).map((w,i)=>(
                        <div key={i} style={{fontSize:"0.72rem",background:"#eff6ff",color:"#1d4ed8",padding:"3px 8px",borderRadius:"6px",fontWeight:600}}>💧 {fmtMon(w.date)}</div>
                      ))}
                      {wl.length>8&&<div style={{fontSize:"0.72rem",color:C.textFaint,padding:"3px 4px",fontStyle:"italic"}}>+{wl.length-8}</div>}
                    </div>
                  </div>}
                </div>
              );
            })}
          </>
        )}
      </div>
    </Panel>
    <ConfirmSheet show={!!confirmRestore} title="Restore this crop?" message={confirmRestore?`${confirmRestore.name}${confirmRestore.variety?` (${confirmRestore.variety})`:""} will be moved back to your active crops.`:""} confirmLabel="Restore" onConfirm={()=>{if(confirmRestore){onRestore(confirmRestore.id);setConfirmRestore(null);}}} onCancel={()=>setConfirmRestore(null)}/>
    </>
  );
}

// ── Main App ───────────────────────────────────────────────────
function App() {
  // ── Auth state ──────────────────────────────────────────────
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const saveTimer=useRef(null);

  // Check for existing session on mount — also handles email confirmation redirect
  useEffect(()=>{
    // When Supabase redirects back after email confirmation, the token is in the URL hash.
    // exchangeCodeForSession / getSession picks it up automatically in v2.
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
      setAuthLoading(false);
      // Clean the URL hash so it doesn't show on screen
      if(window.location.hash&&window.location.hash.includes("access_token")){
        window.history.replaceState(null,"",window.location.pathname);
      }
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      setUser(session?.user||null);
      if(event==="SIGNED_IN") setAuthLoading(false);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // ── Garden state — always start empty, filled by Supabase load ─
  const [dbLoaded,setDbLoaded]=useState(false);
  const [settings,setSettings]   = useState(null);
  const [locations,setLocations] = useState([]);
  const [crops,setCrops]         = useState([]);
  const [todos,setTodos]         = useState([]);
  const [nutrients,setNutrients] = useState(DEFAULT_NUTRIENTS);
  const [cropNames,setCropNames] = useState(DEFAULT_CROPS);
  const [varieties,setVarieties] = useState({});

  // Load from Supabase when user logs in — always replaces state entirely
  useEffect(()=>{
    if(!user){
      // User signed out — wipe all state so next user starts clean
      setDbLoaded(false);
      setSettings(null);
      setLocations([]);
      setCrops([]);
      setTodos([]);
      setNutrients(DEFAULT_NUTRIENTS);
      setCropNames(DEFAULT_CROPS);
      setVarieties({});
      return;
    }
    setDbLoaded(false);
    dbLoad(user.id).then(row=>{
      if(row){
        // Existing user — load their data
        if(row.settings)   setSettings(row.settings);
        if(row.locations)  setLocations(row.locations);
        if(row.crops){
          const seen=new Set();
          setCrops(row.crops.map(c=>{
            let id=c.id;
            if(typeof id!=="string"||!id.startsWith("crop_")||seen.has(id)) id=uid("crop");
            seen.add(id);
            return {...c,id};
          }));
        }
        if(row.todos)      setTodos(row.todos);
        if(row.nutrients)  setNutrients(row.nutrients);
        if(row.crop_names) setCropNames(row.crop_names);
        if(row.varieties)  setVarieties(row.varieties);
      }
      // New user — state stays at empty defaults, wizard will run
      setDbLoaded(true);
    });
  },[user?.id]);

  // Debounced Supabase save — fires 1.5s after last state change
  const scheduleSave=useCallback((payload)=>{
    if(!user) return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      setSyncing(true);
      dbSave(user.id,payload).finally(()=>setSyncing(false));
    },1500);
  },[user?.id]);

  // Single unified save effect — fires whenever any garden state changes
  // useRef tracks dbLoaded to avoid the stale-closure problem with individual effects
  const dbLoadedRef = useRef(false);
  useEffect(()=>{ dbLoadedRef.current = dbLoaded; },[dbLoaded]);

  useEffect(()=>{
    if(!dbLoadedRef.current||!user||!settings) return;
    scheduleSave({settings,locations,crops,todos,nutrients,crop_names:cropNames,varieties});
  },[settings,locations,crops,todos,nutrients,cropNames,varieties]);

  // ── Weather ─────────────────────────────────────────────────
  const [weatherData,setWeatherData]=useState(null);
  const [weatherLocation,setWeatherLocation]=useState(null);
  const [weatherLoading,setWeatherLoading]=useState(false);
  const [weatherError,setWeatherError]=useState("");

  const loadWeather=async(zipCode)=>{
    if(!zipCode||!/^\d{5}$/.test(zipCode)){setWeatherError("ZIP code required for weather");return;}
    setWeatherLoading(true);setWeatherError("");
    try{
      const geo=await geocodeZip(zipCode);
      if(!geo){setWeatherError("Could not look up that ZIP code");setWeatherLoading(false);return;}
      setWeatherLocation(geo);
      const raw=await fetchWeather(geo.lat,geo.lon);
      if(!raw){setWeatherError("Weather data unavailable — check connection");setWeatherLoading(false);return;}
      const today={
        date:raw.daily.time[0],
        currentTemp:raw.current.temperature_2m,
        feelsLike:raw.current.apparent_temperature,
        humidity:raw.current.relative_humidity_2m,
        dewPoint:raw.current.dew_point_2m,
        wind:raw.current.wind_speed_10m,
        windGusts:raw.current.wind_gusts_10m,
        uvIndex:raw.current.uv_index,
        high:raw.daily.temperature_2m_max[0],
        low:raw.daily.temperature_2m_min[0],
        precip:raw.daily.precipitation_sum[0]||0,
        precipProb:raw.daily.precipitation_probability_max?.[0]||0,
        info:decodeWMO(raw.current.weather_code),
      };
      const forecast=raw.daily.time.slice(1).map((d,i)=>({
        date:d,
        high:raw.daily.temperature_2m_max[i+1],
        low:raw.daily.temperature_2m_min[i+1],
        precip:raw.daily.precipitation_sum[i+1]||0,
        precipProb:raw.daily.precipitation_probability_max?.[i+1]||0,
        humidity:raw.daily.relative_humidity_2m_mean?.[i+1],
        info:decodeWMO(raw.daily.weather_code[i+1]),
      }));
      setWeatherData({today,forecast});
    }catch(e){setWeatherError("Weather fetch failed");}
    setWeatherLoading(false);
  };

  useEffect(()=>{ if(settings?.zip) loadWeather(settings.zip); },[settings?.zip]);

  // Re-fetch weather when app comes back into focus (e.g. switching back from another app)
  useEffect(()=>{
    if(!settings?.zip) return;
    const onFocus=()=>loadWeather(settings.zip);
    window.addEventListener("focus",onFocus);
    document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible") loadWeather(settings.zip);});
    return()=>window.removeEventListener("focus",onFocus);
  },[settings?.zip]);

  const [view,setView]         = useState("dashboard");
  const [prevView,setPrevView] = useState("dashboard");
  const navigate = (v) => { setPrevView(view); setView(v); };
  const [selLoc,setSelLoc]     = useState(null);
  const [selCrop,setSelCrop]   = useState(null);
  const [editCrop,setEditCrop] = useState(null);

  const t0=todayStr();
  const todayW=weatherData?.today||null;
  const active=crops.filter(c=>!c.archived);
  const activeLocs=locations.filter(loc=>active.some(c=>c.location===loc));
  const gardenName=settings?.gardenName||"My Garden";
  const zone=settings?.zone||"";

  if(authLoading) return <div style={{width:"100%",height:"100%",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:"2.5rem"}}>🌿</div></div>;
  if(!user) return <AuthScreen onAuth={u=>setUser(u)}/>;
  if(!dbLoaded) return <div style={{width:"100%",height:"100%",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px"}}><div style={{fontSize:"2.5rem"}}>🌿</div><div style={{fontSize:"0.85rem",color:"rgba(255,255,255,0.4)"}}>Loading your garden…</div></div>;
  if(!settings){
    return <Wizard onComplete={(s,addCrop)=>{
      const newSettings={gardenName:s.gardenName,zone:s.zone,zip:s.zip};
      const newLocations=s.locations;
      setSettings(newSettings);
      setLocations(newLocations);
      // Immediately save to Supabase so new user's data is persisted right away
      if(user) dbSave(user.id,{settings:newSettings,locations:newLocations,crops:[],todos:[],nutrients:DEFAULT_NUTRIENTS,crop_names:DEFAULT_CROPS,varieties:{}});
      if(addCrop) setView("addCrop");
    }}/>;
  }

  const saveCrop=(crop,newLocs)=>{
    // Capture whether we're in edit mode at the time of the save
    const initialCropBeingEdited=editCrop;
    if(newLocs){setLocations(prev=>[...new Set([...prev,...newLocs])]);}
    // Track crop name in database
    if(crop.name){
      const tc=titleCase(crop.name);
      setCropNames(prev=>prev.map(n=>n.toLowerCase()).includes(tc.toLowerCase())?prev:[...prev,tc]);
    }
    // Track variety under this crop name
    if(crop.name&&crop.variety){
      const cn=titleCase(crop.name);
      const tv=titleCase(crop.variety);
      setVarieties(prev=>{
        const existing=prev[cn]||[];
        if(existing.map(v=>v.toLowerCase()).includes(tv.toLowerCase())) return prev;
        return {...prev,[cn]:[...existing,tv]};
      });
    }
    setCrops(cs=>{
      // Defensive: if ID collides with an existing crop AND we're not editing it, force a new unique ID
      const existingIdx=cs.findIndex(x=>x.id===crop.id);
      const isEdit=!!(initialCropBeingEdited && initialCropBeingEdited.id===crop.id);
      if(existingIdx>=0 && !isEdit){
        // Collision on add — create a new crop with a guaranteed-unique ID
        return [...cs,{...crop,id:uid("crop"),notes:[],harvests:[],feedLog:[],feedSchedules:{},stageHistory:[{stage:crop.stage||"Seedling",date:t0}],waterLog:[]}];
      }
      if(existingIdx<0){
        return [...cs,{...crop,notes:[],harvests:[],feedLog:[],feedSchedules:{},stageHistory:[{stage:crop.stage||"Seedling",date:t0}],waterLog:[]}];
      }
      return cs.map(x=>{
        if(x.id!==crop.id) return x;
        if(x.stage!==crop.stage && !crop.archived){
          const note={date:t0,text:`Stage changed to ${crop.stage}`,auto:true};
          const sh=[...(x.stageHistory||[]),{stage:crop.stage,date:t0}];
          return {...crop,stageHistory:sh,notes:[...(crop.notes||[]),note]};
        }
        return crop;
      });
    });
    if(crop.archived){setView(selLoc?"location":"dashboard");setSelCrop(null);}
    else{setView(editCrop?"crop":"dashboard");setEditCrop(null);}
  };

  const addNote=(id,text,auto=false)=>{
    const e={date:t0,text,auto:auto||false,id:Date.now()+Math.random()};
    setCrops(cs=>cs.map(c=>c.id===id?{...c,notes:[...c.notes,e]}:c));
    setSelCrop(p=>p?.id===id?{...p,notes:[...p.notes,e]}:p);
  };
  const editNote=(cropId,noteIdx,newText)=>{
    setCrops(cs=>cs.map(c=>{if(c.id!==cropId)return c;const notes=[...c.notes];notes[noteIdx]={...notes[noteIdx],text:newText,edited:true};return{...c,notes};}));
    setSelCrop(p=>{if(!p||p.id!==cropId)return p;const notes=[...p.notes];notes[noteIdx]={...notes[noteIdx],text:newText,edited:true};return{...p,notes};});
  };
  const deleteNote=(cropId,noteIdx)=>{
    setCrops(cs=>cs.map(c=>{
      if(c.id!==cropId) return c;
      const note=c.notes[noteIdx];
      // If it's an auto stage-change note, roll back stage and timeline
      if(note?.auto && note.text?.startsWith("Stage changed to ")){
        const removedStage=note.text.replace("Stage changed to ","").trim();
        const sh=[...(c.stageHistory||[])];
        // Remove the matching stage history entry (most recent one with that stage & date)
        const matchIdx=sh.findLastIndex?sh.findLastIndex(s=>s.stage===removedStage&&s.date===note.date):
          (()=>{for(let i=sh.length-1;i>=0;i--) if(sh[i].stage===removedStage&&sh[i].date===note.date) return i;return -1;})();
        if(matchIdx!==-1) sh.splice(matchIdx,1);
        // Revert crop's current stage to last remaining stage in history (or Seedling)
        const prevStage=sh.length?sh[sh.length-1].stage:"Seedling";
        return{...c,stage:prevStage,stageHistory:sh,notes:c.notes.filter((_,i)=>i!==noteIdx)};
      }
      return{...c,notes:c.notes.filter((_,i)=>i!==noteIdx)};
    }));
    setSelCrop(p=>{
      if(!p||p.id!==cropId) return p;
      const note=p.notes[noteIdx];
      if(note?.auto && note.text?.startsWith("Stage changed to ")){
        const removedStage=note.text.replace("Stage changed to ","").trim();
        const sh=[...(p.stageHistory||[])];
        const matchIdx=(()=>{for(let i=sh.length-1;i>=0;i--) if(sh[i].stage===removedStage&&sh[i].date===note.date) return i;return -1;})();
        if(matchIdx!==-1) sh.splice(matchIdx,1);
        const prevStage=sh.length?sh[sh.length-1].stage:"Seedling";
        return{...p,stage:prevStage,stageHistory:sh,notes:p.notes.filter((_,i)=>i!==noteIdx)};
      }
      return{...p,notes:p.notes.filter((_,i)=>i!==noteIdx)};
    });
  };
  const logHarvest=(id,obj)=>{
    const e={date:t0,...obj};
    setCrops(cs=>cs.map(c=>c.id===id?{...c,harvests:[...c.harvests,e]}:c));
    setSelCrop(p=>p?.id===id?{...p,harvests:[...p.harvests,e]}:p);
  };
  const editHarvest=(cropId,hIdx,updated)=>{
    setCrops(cs=>cs.map(c=>{if(c.id!==cropId)return c;const harvests=[...c.harvests];harvests[hIdx]={...harvests[hIdx],...updated};return{...c,harvests};}));
    setSelCrop(p=>{if(!p||p.id!==cropId)return p;const harvests=[...p.harvests];harvests[hIdx]={...harvests[hIdx],...updated};return{...p,harvests};});
  };
  const deleteHarvest=(cropId,hIdx)=>{
    setCrops(cs=>cs.map(c=>c.id===cropId?{...c,harvests:c.harvests.filter((_,i)=>i!==hIdx)}:c));
    setSelCrop(p=>p?.id===cropId?{...p,harvests:p.harvests.filter((_,i)=>i!==hIdx)}:p);
  };
  const restoreCrop=(id)=>{
    setCrops(cs=>cs.map(c=>c.id===id?{...c,archived:false,stage:c.stageHistory?.[c.stageHistory.length-1]?.stage||"Vegetative"}:c));
  };
  const logFeed=(id,nutrient,qty,water,intervalDays)=>{
    const entry={date:t0,nutrient,qty:qty||null,water:water||null};
    // Build schedule object with defaults from this feeding so the form can pre-fill next time
    const buildSched=(existing)=>{
      if(!intervalDays) return existing||{};
      const prev=existing?.[nutrient];
      const prevObj=typeof prev==="object"?prev:{};
      const qtyParts=qty?qty.split(" "):["",""];
      const waterParts=water?water.split(" "):["",""];
      return {...existing,[nutrient]:{days:intervalDays,qty:qtyParts[0]||prevObj.qty||"",unit:qtyParts.slice(1).join(" ")||prevObj.unit||"tbsp",water:waterParts[0]||prevObj.water||"",waterUnit:waterParts.slice(1).join(" ")||prevObj.waterUnit||"gal"}};
    };
    setCrops(cs=>cs.map(c=>{if(c.id!==id)return c;const ns=intervalDays?buildSched(c.feedSchedules):(c.feedSchedules||{});return{...c,lastFed:t0,feedLog:[...(c.feedLog||[]),entry],feedSchedules:ns};}));
    setSelCrop(p=>{if(!p||p.id!==id)return p;const ns=intervalDays?buildSched(p.feedSchedules):(p.feedSchedules||{});return{...p,lastFed:t0,feedLog:[...(p.feedLog||[]),entry],feedSchedules:ns};});
  };
  const editFeed=(cropId,fIdx,updated)=>{
    setCrops(cs=>cs.map(c=>{if(c.id!==cropId)return c;const fl=[...(c.feedLog||[])];fl[fIdx]={...fl[fIdx],...updated};return{...c,feedLog:fl};}));
    setSelCrop(p=>{if(!p||p.id!==cropId)return p;const fl=[...(p.feedLog||[])];fl[fIdx]={...fl[fIdx],...updated};return{...p,feedLog:fl};});
  };
  const deleteFeed=(cropId,fIdx)=>{
    setCrops(cs=>cs.map(c=>c.id===cropId?{...c,feedLog:(c.feedLog||[]).filter((_,i)=>i!==fIdx)}:c));
    setSelCrop(p=>p?.id===cropId?{...p,feedLog:(p.feedLog||[]).filter((_,i)=>i!==fIdx)}:p);
  };
  const waterCrop=(id)=>{
    const entry={date:t0};
    setCrops(cs=>cs.map(c=>c.id===id?{...c,waterLog:[...(c.waterLog||[]),entry]}:c));
    setSelCrop(p=>p?.id===id?{...p,waterLog:[...(p.waterLog||[]),entry]}:p);
  };
  const transplantCrop=(id,toLoc,date,inContainer,containerSize,newLocs)=>{
    if(newLocs)setLocations(prev=>[...new Set([...prev,...newLocs])]);
    const noteText=`Transplanted from ${crops.find(c=>c.id===id)?.location||"?"} to ${toLoc} on ${fmtDate(date)}${inContainer&&containerSize?` · ${containerSize}`:""}`;
    setCrops(cs=>cs.map(c=>{if(c.id!==id)return c;const note={date:t0,text:noteText,auto:true};return{...c,location:toLoc,transplantDate:date,inContainer,containerSize:containerSize||"",notes:[...c.notes,note]};}));
    setSelCrop(p=>{if(!p||p.id!==id)return p;const note={date:t0,text:noteText,auto:true};return{...p,location:toLoc,transplantDate:date,inContainer,containerSize:containerSize||"",notes:[...p.notes,note]};});
  };
  const changeStage=(id,stage)=>{
    const note={date:t0,text:`Stage changed to ${stage}`,auto:true};
    setCrops(cs=>cs.map(c=>{if(c.id!==id)return c;const sh=[...(c.stageHistory||[]),{stage,date:t0}];return{...c,stage,stageHistory:sh,notes:[...c.notes,note]};}));
    setSelCrop(p=>{if(!p||p.id!==id)return p;const sh=[...(p.stageHistory||[]),{stage,date:t0}];return{...p,stage,stageHistory:sh,notes:[...p.notes,note]};});
  };
  const addNutrient=n=>setNutrients(ns=>ns.includes(n)?ns:[...ns,n]);
  const addTodo=t=>setTodos(ts=>[...ts,t]);
  const toggleTodo=id=>setTodos(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteTodo=id=>setTodos(ts=>ts.filter(t=>t.id!==id));

  const taskCount=active.filter(c=>{
    const s=c.feedSchedules||{};const fl=c.feedLog||[];
    const fo=Object.entries(s).some(([n,d])=>{const l=[...fl].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);});
    const ws=hwStatus(c);
    const ss=c.successionDays&&c.seedDate&&daysUntil(succDate(c.seedDate,c.successionDays))<=7;
    return fo||ws?.inWindow||ss;
  }).length+todos.filter(t=>!t.done).length;

  const syncedCrop=selCrop?crops.find(c=>c.id===selCrop.id)||selCrop:null;

  return(
    <div style={{width:"100%",height:"100%",background:C.bg,color:"white",position:"relative",overflow:"hidden"}}>
      {/* Dashboard */}
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch",paddingBottom:"calc(84px + max(16px,env(safe-area-inset-bottom)))"}}>
        <div style={{padding:"max(16px,env(safe-area-inset-top)) 18px 18px",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              {zone&&<div style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.18em",color:C.greenFg,textTransform:"uppercase",marginBottom:"4px",opacity:0.7}}>Zone {zone}</div>}
              <h1 style={{fontFamily:F.serif,fontSize:"1.85rem",margin:0,color:"white",fontWeight:700,lineHeight:1}}>{gardenName}</h1>
              <div style={{fontSize:"0.78rem",color:C.dashSub,marginTop:"5px"}}>{active.length} active crop{active.length!==1?"s":""}{activeLocs.length>0?` · ${activeLocs.length} location${activeLocs.length!==1?"s":""}`:""}</div>
            </div>
            <div style={{display:"flex",gap:"8px",marginTop:"4px"}}>
              <button onClick={()=>{if(settings?.zip)loadWeather(settings.zip);setView("weather");}} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"12px",padding:"8px 12px",cursor:"pointer",color:"white",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",minWidth:"60px"}}>
                {todayW?(
                  <>
                    <span style={{fontSize:"1.2rem",lineHeight:1}}>{weatherLoading?"⟳":todayW.info.emoji}</span>
                    <span style={{fontSize:"0.68rem",fontWeight:600,color:C.dashSub}}>{Math.round(todayW.high)}°/{Math.round(todayW.low)}°</span>
                  </>
                ):(
                  <>
                    <span style={{fontSize:"1.2rem",lineHeight:1}}>{weatherLoading?"⟳":"🌡"}</span>
                    <span style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.35)"}}>{weatherLoading?"…":"weather"}</span>
                  </>
                )}
              </button>
              <button onClick={()=>setView("settings")} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"12px",padding:"10px 14px",cursor:"pointer",color:"rgba(255,255,255,0.55)",fontSize:"1.1rem",lineHeight:1}}>⚙</button>
            </div>
          </div>
        </div>
        <div style={{padding:"0 14px",display:"flex",flexDirection:"column",gap:"10px"}}>
          {activeLocs.length===0?(
            <div style={{textAlign:"center",padding:"5rem 0",color:"rgba(255,255,255,0.2)"}}>
              <div style={{fontSize:"3rem",marginBottom:"12px"}}>🌱</div>
              <div style={{fontSize:"0.95rem",marginBottom:"6px"}}>No crops logged yet.</div>
              <div style={{fontSize:"0.78rem",opacity:0.7}}>Tap + Add Crop to get started.</div>
            </div>
          ):activeLocs.map(loc=><LocCard key={loc} loc={loc} crops={crops} onClick={()=>{setSelLoc(loc);setView("location");}}/>)}
        </div>
      </div>

      {/* Bottom Nav */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(14,21,14,0.97)",backdropFilter:"blur(24px)",borderTop:"1px solid rgba(255,255,255,0.06)",paddingBottom:"max(16px,env(safe-area-inset-bottom))",display:"flex",alignItems:"stretch",zIndex:200}}>
        <button onClick={()=>setView("todo")} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"3px",padding:"12px 8px",background:"none",border:"none",color:"rgba(255,255,255,0.45)",cursor:"pointer",position:"relative"}}>
          <span style={{fontSize:"1.25rem",lineHeight:1}}>✓</span>
          <span style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>To-Do</span>
          {taskCount>0&&<span style={{position:"absolute",top:"8px",right:"calc(50% - 22px)",background:C.amber,color:"white",borderRadius:"10px",minWidth:"18px",height:"18px",fontSize:"0.6rem",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{taskCount}</span>}
        </button>
        <button onClick={()=>{setEditCrop(null);navigate("addCrop");}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"4px",padding:"10px 8px",background:"none",border:"none",cursor:"pointer"}}>
          <div style={{width:"48px",height:"48px",borderRadius:"50%",background:C.green,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(34,197,94,0.3)"}}>
            <span style={{fontSize:"1.6rem",color:"#052e16",lineHeight:1,marginTop:"-1px"}}>+</span>
          </div>
          <span style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:C.green}}>Add Crop</span>
        </button>
        <button onClick={()=>setView("report")} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"3px",padding:"12px 8px",background:"none",border:"none",color:"rgba(255,255,255,0.45)",cursor:"pointer"}}>
          <span style={{fontSize:"1.25rem",lineHeight:1}}>📊</span>
          <span style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>Report</span>
        </button>
      </div>

      {/* Panels */}
      <LocationPanel show={view==="location"} location={selLoc} crops={crops}
        onClose={()=>setView("dashboard")} onCropTap={c=>{setSelCrop(c);setView("crop");}}
        onAddCrop={()=>{setEditCrop(null);navigate("addCrop");}} onWater={waterCrop}/>

      <CropDetailPanel show={view==="crop"} crop={syncedCrop} allCrops={crops} locations={locations} nutrients={nutrients}
        onClose={()=>setView(selLoc?"location":"dashboard")}
        onEdit={()=>{setEditCrop(syncedCrop);setView("editCrop");}}
        onMarkDone={c=>saveCrop({...c,stage:"Done",archived:true})}
        onMarkLost={c=>saveCrop({...c,stage:"Lost",archived:true})}
        onAddNote={addNote} onEditNote={editNote} onDeleteNote={deleteNote}
        onLogHarvest={logHarvest} onEditHarvest={editHarvest} onDeleteHarvest={deleteHarvest}
        onAddFeed={logFeed} onEditFeed={editFeed} onDeleteFeed={deleteFeed} onAddNutrient={addNutrient}
        onTransplant={transplantCrop} onWater={waterCrop}/>

      <CropFormPanel show={view==="addCrop"||view==="editCrop"} initial={view==="editCrop"?editCrop:null} locations={locations} cropNames={cropNames} varieties={varieties} defaultLocation={view==="addCrop"?selLoc:null}
        onSave={saveCrop} onClose={()=>setView(view==="editCrop"?"crop":view==="addCrop"&&selLoc&&prevView==="location"?"location":"dashboard")}/>

      <TodoPanel show={view==="todo"} crops={crops} todos={todos} onAddTodo={addTodo} onToggleTodo={toggleTodo} onDeleteTodo={deleteTodo} onClose={()=>setView("dashboard")}/>
      <WeatherPanel show={view==="weather"} weatherData={weatherData} location={weatherLocation} loading={weatherLoading} error={weatherError} onRefresh={()=>settings?.zip&&loadWeather(settings.zip)} onClose={()=>setView("dashboard")}/>
      <ReportPanel show={view==="report"} crops={crops} onRestore={restoreCrop} onClose={()=>setView("dashboard")}/>
      <SettingsPanel show={view==="settings"} settings={settings} locations={locations}
        user={user} syncing={syncing}
        onSave={(s,locs)=>{setSettings(p=>({...p,...s}));setLocations(locs);setView("dashboard");}}
        onSignOut={async()=>{
          await sb.auth.signOut();
          // Wipe localStorage so next user on this device starts clean
          ["garden:settings","garden:locations","garden:crops","garden:todos","garden:nutrients","garden:cropNames","garden:varieties"].forEach(k=>localStorage.removeItem(k));
          setUser(null);setDbLoaded(false);
        }}
        onClose={()=>setView("dashboard")}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
