// ── Feed Log Sheet ─────────────────────────────────────────────
function FeedLogSheet({show,crop,allCrops,nutrients,onAddNutrient,onAddFeed,onEditFeed,onDeleteFeed,onClose}) {
  const [input,setInput]=useState("");
  const [qty,setQty]=useState("");
  const [unit,setUnit]=useState("tbsp");
  const [isLiquid,setIsLiquid]=useState(false);
  const [waterQty,setWaterQty]=useState("");
  const [waterUnit,setWaterUnit]=useState("gal");
  const [showDrop,setShowDrop]=useState(false);
  const [askInterval,setAskInterval]=useState(false);
  const [intervalDays,setIntervalDays]=useState("");
  const UNITS=["tsp","tbsp","cup","fl oz","ml","L","oz","lb","g"];
  const WUNITS=["fl oz","cup","pt","qt","gal","ml","L"];
  const schedules=crop?.feedSchedules||{};

  // Smart ordering: rank by usage count (desc), tiebreak by user-added (after defaults) first
  const usageCounts={};
  (crop?.feedLog||[]).forEach(f=>{if(f.nutrient) usageCounts[f.nutrient]=(usageCounts[f.nutrient]||0)+1;});
  const stockSet=new Set(DEFAULT_NUTRIENTS.map(n=>n.toLowerCase()));
  const rankedNutrients=[...nutrients].sort((a,b)=>{
    const ua=usageCounts[a]||0, ub=usageCounts[b]||0;
    if(ua!==ub) return ub-ua;
    const uaStock=stockSet.has(a.toLowerCase()), ubStock=stockSet.has(b.toLowerCase());
    if(uaStock!==ubStock) return uaStock?1:-1; // user-added first when usage ties
    return a.localeCompare(b);
  });
  const filtered=rankedNutrients.filter(n=>n.toLowerCase().includes(input.toLowerCase()));

  function reset(){setInput("");setQty("");setIsLiquid(false);setWaterQty("");setShowDrop(false);setAskInterval(false);setIntervalDays("");}
  // Auto-fill most common qty/unit/dilution for this nutrient across all crops
  function selectN(n){
    setInput(n);
    setShowDrop(false);
    // Scan all feed logs across all crops for this nutrient to find defaults
    const allFeeds=(allCrops||[]).flatMap(c=>c.feedLog||[]).filter(f=>f.nutrient===n);
    if(!allFeeds.length) return;
    // Most common qty (full string like "2 tbsp")
    const qtyCounts={};
    allFeeds.forEach(f=>{if(f.qty) qtyCounts[f.qty]=(qtyCounts[f.qty]||0)+1;});
    const topQty=Object.entries(qtyCounts).sort((a,b)=>b[1]-a[1])[0];
    if(topQty){
      const parts=topQty[0].split(" ");
      if(parts.length>=2){
        setQty(parts[0]);
        setUnit(parts.slice(1).join(" "));
      }
    }
    // Most common water (full string like "1 gal")
    const waterCounts={};
    allFeeds.forEach(f=>{if(f.water) waterCounts[f.water]=(waterCounts[f.water]||0)+1;});
    const topWater=Object.entries(waterCounts).sort((a,b)=>b[1]-a[1])[0];
    // Most common dilution state (was more than half of uses diluted?)
    const dilutedCount=allFeeds.filter(f=>f.water).length;
    const wasOftenDiluted=dilutedCount>allFeeds.length/2;
    if(wasOftenDiluted&&topWater){
      setIsLiquid(true);
      const wparts=topWater[0].split(" ");
      if(wparts.length>=2){
        setWaterQty(wparts[0]);
        setWaterUnit(wparts.slice(1).join(" "));
      }
    } else {
      setIsLiquid(false);
      setWaterQty("");
    }
  }
  function submit(){
    const name=titleCase(input.trim()); if(!name) return;
    if(!nutrients.map(n=>n.toLowerCase()).includes(name.toLowerCase())) onAddNutrient(name);
    if(!schedules[name]){setAskInterval(true);return;}
    onAddFeed(crop.id,name,qty?`${qty} ${unit}`:null,(isLiquid&&waterQty)?`${waterQty} ${waterUnit}`:null,null);
    reset();onClose();
  }
  function submitWithInterval(){
    const name=titleCase(input.trim());
    onAddFeed(crop.id,name,qty?`${qty} ${unit}`:null,(isLiquid&&waterQty)?`${waterQty} ${waterUnit}`:null,intervalDays?Number(intervalDays):null);
    reset();onClose();
  }
  if(askInterval){
    const name=titleCase(input.trim());
    return(
      <Sheet show={show} onClose={()=>{reset();onClose();}} title="Set Feeding Schedule">
        <div style={{display:"flex",flexDirection:"column",gap:"16px",paddingTop:"8px"}}>
          <div style={{background:"#f0fdf4",borderRadius:"12px",padding:"14px",border:"1px solid #bbf7d0"}}>
            <div style={{fontSize:"0.88rem",fontWeight:700,color:C.greenDark,marginBottom:"4px"}}>{name}</div>
            <div style={{fontSize:"0.9rem",color:C.textSub,lineHeight:1.5}}>First time logging this on <strong>{crop?.name}{crop?.variety?` (${crop.variety})`:""}</strong>. How often do you plan to use it on this crop?</div>
          </div>
          <Field label="Feed every (days)" value={intervalDays} onChange={e=>setIntervalDays(e.target.value)} type="number" placeholder="e.g. 7" hint="You can update this any time"/>
          <Btn onClick={submitWithInterval} disabled={!intervalDays}>Set Schedule &amp; Save</Btn>
          <button onClick={()=>{onAddFeed(crop.id,titleCase(input.trim()),qty?`${qty} ${unit}`:null,(isLiquid&&waterQty)?`${waterQty} ${waterUnit}`:null,null);reset();onClose();}} style={{background:"white",border:`1.5px solid ${C.border}`,borderRadius:"12px",color:C.text,fontSize:"0.92rem",fontWeight:600,cursor:"pointer",padding:"12px",width:"100%"}}>Save without a schedule</button>
        </div>
      </Sheet>
    );
  }
  const iStyle={padding:"12px 14px",borderRadius:"10px",border:`1.5px solid ${C.border}`,fontSize:"0.95rem",background:"white",outline:"none"};
  return(
    <Sheet show={show} onClose={()=>{reset();onClose();}} title="Log Feed">
      <div style={{display:"flex",flexDirection:"column",gap:"14px",paddingTop:"8px"}}>
        <div style={{position:"relative"}}>
          <div style={{fontSize:"0.78rem",fontWeight:600,color:C.textSub,marginBottom:"6px"}}>Nutrient / Fertilizer</div>
          <input value={input} onChange={e=>{setInput(e.target.value);setShowDrop(true);}} onFocus={()=>setShowDrop(true)} onBlur={()=>setTimeout(()=>setShowDrop(false),180)} placeholder="Type or choose..." style={{...iStyle,width:"100%"}}/>
          {showDrop&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:`1.5px solid ${C.border}`,borderRadius:"10px",boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:50,maxHeight:"240px",overflowY:"auto",marginTop:"4px"}}>
            {input.trim()&&!nutrients.map(n=>n.toLowerCase()).includes(input.trim().toLowerCase())&&<div onMouseDown={()=>selectN(titleCase(input.trim()))} style={{padding:"12px 14px",cursor:"pointer",fontSize:"0.9rem",color:C.greenMid,fontWeight:600,borderBottom:`1px solid ${C.border}`,background:"#f0fdf4"}}>+ Add "{titleCase(input.trim())}"</div>}
            {(input.trim()?filtered:rankedNutrients).map(n=>{
              const sched=schedules[n];
              const count=usageCounts[n]||0;
              const isCustom=!stockSet.has(n.toLowerCase());
              return(
                <div key={n} onMouseDown={()=>selectN(n)} style={{padding:"10px 14px",cursor:"pointer",fontSize:"0.9rem",color:C.text,borderBottom:`1px solid #f9fafb`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:"8px"}}>
                  <span style={{display:"flex",alignItems:"center",gap:"8px",minWidth:0,flex:1}}>
                    <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{n}</span>
                    {isCustom&&<span style={{fontSize:"0.64rem",color:"#7c3aed",fontWeight:700,background:"#f3e8ff",padding:"1px 6px",borderRadius:"5px",flexShrink:0}}>CUSTOM</span>}
                  </span>
                  <span style={{display:"flex",gap:"5px",flexShrink:0}}>
                    {count>0&&<span style={{fontSize:"0.7rem",color:C.textSub,fontWeight:600}}>{count}×</span>}
                    {sched&&<span style={{fontSize:"0.68rem",color:C.greenMid,fontWeight:600,background:"#dcfce7",padding:"2px 7px",borderRadius:"6px"}}>every {scheduleDays(sched)}d</span>}
                  </span>
                </div>
              );
            })}
          </div>}
          {input&&schedules[titleCase(input.trim())]&&<div style={{marginTop:"5px",fontSize:"0.78rem",color:C.greenMid,fontWeight:500}}>Schedule: every {scheduleDays(schedules[titleCase(input.trim())])} days</div>}
        </div>
        <div>
          <div style={{fontSize:"0.78rem",fontWeight:600,color:C.textSub,marginBottom:"6px"}}>Quantity <span style={{color:C.textFaint,fontWeight:400}}>(optional)</span></div>
          <div style={{display:"flex",gap:"8px"}}>
            <input type="number" min="0" step="any" value={qty} onChange={e=>setQty(e.target.value)} placeholder="e.g. 2" style={{...iStyle,flex:1}}/>
            <select value={unit} onChange={e=>setUnit(e.target.value)} style={{...iStyle,color:C.textSub,padding:"12px 10px"}}>{UNITS.map(u=><option key={u}>{u}</option>)}</select>
          </div>
        </div>
        <div>
          <div onClick={()=>setIsLiquid(v=>!v)} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",background:isLiquid?"#eff6ff":"#f9fafb",borderRadius:"10px",border:`1.5px solid ${isLiquid?"#93c5fd":C.border}`,cursor:"pointer",userSelect:"none"}}>
            <div className={`cb ${isLiquid?"checked":""}`}>{isLiquid&&<span style={{color:"white",fontSize:"0.8rem"}}>✓</span>}</div>
            <div><div style={{fontSize:"0.92rem",fontWeight:600,color:C.text}}>Diluted in water</div><div style={{fontSize:"0.78rem",color:C.textSub}}>Check if mixed with water before applying</div></div>
          </div>
          {isLiquid&&<div style={{marginTop:"10px",display:"flex",gap:"8px"}}>
            <input type="number" min="0" step="any" value={waterQty} onChange={e=>setWaterQty(e.target.value)} placeholder="e.g. 1" style={{...iStyle,flex:1}}/>
            <select value={waterUnit} onChange={e=>setWaterUnit(e.target.value)} style={{...iStyle,color:C.textSub,padding:"12px 10px"}}>{WUNITS.map(u=><option key={u}>{u}</option>)}</select>
          </div>}
        </div>
        <Btn onClick={submit} disabled={!input.trim()}>Save Feed Log</Btn>
      </div>
    </Sheet>
  );
}

// ── Transplant Sheet ───────────────────────────────────────────
function TransplantSheet({show,crop,locations,onTransplant,onClose}) {
  const [toLoc,setToLoc]=useState("");
  const [date,setDate]=useState(todayStr());
  const [inContainer,setInContainer]=useState(false);
  const [containerSize,setContainerSize]=useState("");
  const [showNewLoc,setShowNewLoc]=useState(false);
  const [locInput,setLocInput]=useState("");
  const [locs,setLocs]=useState(locations);
  useEffect(()=>{if(show){setLocs(locations);setToLoc("");setDate(todayStr());setInContainer(crop?.inContainer||false);setContainerSize(crop?.containerSize||"");setShowNewLoc(false);setLocInput("");}}, [show]);
  function addLoc(){const v=locInput.trim();if(v&&!locs.includes(v)){setLocs(l=>[...l,v]);setToLoc(v);}setLocInput("");setShowNewLoc(false);}
  const available=locs.filter(l=>l!==crop?.location);
  const iS={padding:"12px 14px",borderRadius:"10px",border:`1.5px solid ${C.border}`,fontSize:"0.95rem",background:"white",outline:"none"};
  return(
    <Sheet show={show} onClose={onClose} title="Transplant / Move">
      <div style={{display:"flex",flexDirection:"column",gap:"14px",paddingTop:"8px"}}>
        <div style={{background:"#f9fafb",borderRadius:"10px",padding:"12px 14px",border:`1px solid ${C.border}`,fontSize:"0.9rem",color:C.textSub}}>Currently in: <strong style={{color:C.text}}>{crop?.location}</strong></div>
        <div>
          <div style={{fontSize:"0.78rem",fontWeight:600,color:C.textSub,marginBottom:"6px"}}>Move to <span style={{color:C.red}}>*</span></div>
          {!showNewLoc?(
            <div style={{display:"flex",gap:"8px"}}>
              <select value={toLoc} onChange={e=>setToLoc(e.target.value)} style={{...iS,flex:1,appearance:"none"}}>
                <option value="">Select location...</option>
                {available.map(l=><option key={l}>{l}</option>)}
              </select>
              <button onClick={()=>setShowNewLoc(true)} style={{background:"#f3f4f6",border:"none",borderRadius:"10px",padding:"12px 14px",fontSize:"0.85rem",fontWeight:600,color:C.textSub,cursor:"pointer",flexShrink:0}}>+ New</button>
            </div>
          ):(
            <div style={{display:"flex",gap:"8px"}}>
              <input value={locInput} onChange={e=>setLocInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addLoc();}} autoFocus placeholder="Location name..." style={{...iS,flex:1,border:`1.5px solid ${C.green}`}}/>
              <button onClick={addLoc} style={{background:C.green,color:"white",border:"none",borderRadius:"10px",padding:"12px 16px",fontWeight:700,fontSize:"0.9rem",cursor:"pointer"}}>Add</button>
              <button onClick={()=>{setShowNewLoc(false);setLocInput("");}} style={{background:"transparent",border:"none",color:C.textFaint,cursor:"pointer",fontSize:"1rem"}}>✕</button>
            </div>
          )}
        </div>
        <Field label="Transplant Date" value={date} onChange={e=>setDate(e.target.value)} type="date" required/>
        <div>
          <div onClick={()=>setInContainer(v=>!v)} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",background:inContainer?"#eff6ff":"#f9fafb",borderRadius:"10px",border:`1.5px solid ${inContainer?"#93c5fd":C.border}`,cursor:"pointer",userSelect:"none"}}>
            <div className={`cb ${inContainer?"checked":""}`}>{inContainer&&<span style={{color:"white",fontSize:"0.8rem"}}>✓</span>}</div>
            <div><div style={{fontSize:"0.92rem",fontWeight:600,color:C.text}}>Going into a container</div><div style={{fontSize:"0.78rem",color:C.textSub}}>Pot, bucket, bag, DWC, etc.</div></div>
          </div>
          {inContainer&&<div style={{marginTop:"10px"}}><Field label="Container size / type" value={containerSize} onChange={e=>setContainerSize(e.target.value)} placeholder="e.g. 5 gallon fabric pot, 20L DWC..." required/></div>}
        </div>
        <Btn onClick={()=>{if(toLoc){onTransplant(crop.id,toLoc,date,inContainer,containerSize,locs);onClose();}}} disabled={!toLoc}>Confirm Transplant</Btn>
      </div>
    </Sheet>
  );
}

// ── Crop Detail Panel ──────────────────────────────────────────
function CropDetailPanel({show,crop,allCrops,locations,nutrients,onClose,onEdit,onMarkDone,onMarkLost,onAddNote,onEditNote,onDeleteNote,onLogHarvest,onEditHarvest,onDeleteHarvest,onAddFeed,onEditFeed,onDeleteFeed,onAddNutrient,onTransplant,onWater}) {
  const [tab,setTab]=useState("info");
  const [noteText,setNoteText]=useState("");
  const [editingNoteIdx,setEditingNoteIdx]=useState(null);
  const [editingNoteText,setEditingNoteText]=useState("");
  const [deleteNoteIdx,setDeleteNoteIdx]=useState(null);
  const [editingHarvestIdx,setEditingHarvestIdx]=useState(null);
  const [editHarvestData,setEditHarvestData]=useState({amount:"",unit:"g",note:""});
  const [deleteHarvestIdx,setDeleteHarvestIdx]=useState(null);
  const [showFeed,setShowFeed]=useState(false);
  const [showHarvest,setShowHarvest]=useState(false);
  const [showTransplant,setShowTransplant]=useState(false);
  const [confirmDone,setConfirmDone]=useState(false);
  const [confirmLost,setConfirmLost]=useState(false);
  const [editingFeedIdx,setEditingFeedIdx]=useState(null);
  const [editFeedData,setEditFeedData]=useState({nutrient:"",qty:"",unit:"tbsp",water:""});
  const [deleteFeedIdx,setDeleteFeedIdx]=useState(null);
  const FUNITS=["tsp","tbsp","cup","fl oz","ml","L","oz","lb","g"];
  useEffect(()=>{if(show)setTab("info");},[show]);
  if(!crop) return null;
  const acc=cropAccent(crop.name);
  const schedules=crop.feedSchedules||{};
  const feedLog=crop.feedLog||[];
  const waterLog=crop.waterLog||[];
  const overdue=Object.entries(schedules).some(([n,d])=>{const l=[...feedLog].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);});
  const ws=hwStatus(crop);
  const nextSow=crop.successionDays?succDate(crop.seedDate,crop.successionDays):null;
  const sowDiff=nextSow?daysUntil(nextSow):null;
  const lastWater=waterLog.length?waterLog[waterLog.length-1]:null;
  const daysWater=lastWater?daysAgo(lastWater.date):null;
  const total=harvestTotal(crop);
  const dInStage=daysSinceStage(crop);
  const stageHistory=crop.stageHistory||[];
  const startLabel=crop.startType==="direct"?"Direct Sown":crop.startType==="clone"?"Clone / Seedling":"Started Indoors";

  return(
    <>
    <Panel show={show} onClose={onClose} title={`${crop.name}${crop.variety?` · ${crop.variety}`:""}`} bottomBack>
      <div style={{background:`linear-gradient(135deg,${acc.from},${acc.to})`,padding:"20px 20px 18px"}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.14em",color:"rgba(255,255,255,0.55)",textTransform:"uppercase",marginBottom:"5px"}}>{crop.name}</div>
        <div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"1.6rem",color:"white",lineHeight:1.2}}>{crop.variety||<span style={{opacity:0.5}}>No variety</span>}</div>
      </div>
      <div style={{display:"flex",background:"white",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:10}}>
        {["info","notes","harvests"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"14px 0",border:"none",background:"transparent",fontSize:"0.85rem",fontWeight:600,color:tab===t?C.greenMid:C.textSub,borderBottom:`2px solid ${tab===t?C.green:"transparent"}`,cursor:"pointer",textTransform:"capitalize"}}>
            {t==="info"?"Info":t==="notes"?`Notes${crop.notes.length?` (${crop.notes.length})`:""}`:`Harvests${crop.harvests.length?` (${crop.harvests.length})`:""}`}
          </button>
        ))}
      </div>
      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:"12px"}}>
        {tab==="info"&&(
          <>
            {/* Stats grid */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <StatTile label="Stage Duration" value={dInStage!==null?`${crop.stage} · ${dInStage}d`:crop.stage}/>
              <StatTile label="Location" value={crop.location}/>
              <StatTile label="Start Method" value={startLabel}/>
              <StatTile label={crop.inContainer?"Container":"Growing In"} value={crop.inContainer&&crop.containerSize?crop.containerSize:crop.inContainer?"Container":"Ground / Bed"}/>
              <StatTile label={crop.startType==="direct"?"Sow Date":"Start Date"} value={fmtDate(crop.seedDate)}/>
              {crop.transplantDate?<StatTile label="Transplanted" value={fmtDate(crop.transplantDate)}/>:<StatTile label="Weeks Since Start" value={crop.seedDate?`${weeksAgo(crop.seedDate)} wks`:"—"}/>}
              <StatTile label="Est. Harvest" value={harvestFmt(crop.startType==="direct"?crop.seedDate:(crop.transplantDate||crop.seedDate),crop.daysToMaturity)||"—"}/>
              <StatTile label="Days to Maturity" value={crop.daysToMaturity?`${crop.daysToMaturity}d`:"—"}/>
            </div>

            {/* Stage Timeline */}
            {(()=>{
              if(!stageHistory.length) return null;
              // Only skip true duplicates: same stage on the same date back-to-back
              const deduped=stageHistory.filter((s,i)=>{
                const prev=stageHistory[i-1];
                return !(prev && prev.stage===s.stage && prev.date===s.date);
              });
              if(!deduped.length) return null;
              // Hide if there's only one entry and it was added today (nothing meaningful yet to compare)
              if(deduped.length===1 && daysAgo(deduped[0].date)<=0) return null;
              return(
                <div style={{background:"white",borderRadius:"12px",padding:"14px",border:`1px solid ${C.border}`}}>
                  <SLabel mt="0">Stage Timeline</SLabel>
                  <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                    {deduped.map((s,i)=>{
                      const sc=STAGE_COLORS[s.stage]||STAGE_COLORS.Seedling;
                      const next=deduped[i+1];
                      const days=next
                        ? Math.max(0,Math.round((new Date(next.date)-new Date(s.date))/864e5))
                        : Math.max(0,daysAgo(s.date));
                      return(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:"10px"}}>
                          <div style={{width:"10px",height:"10px",borderRadius:"50%",background:sc.dot,flexShrink:0}}/>
                          <div style={{flex:1,fontSize:"0.85rem",fontWeight:600,color:C.text}}>{s.stage}</div>
                          <div style={{fontSize:"0.75rem",color:C.textFaint}}>{fmtDate(s.date)}</div>
                          <div style={{fontSize:"0.75rem",color:C.textSub,minWidth:"36px",textAlign:"right"}}>{days}d</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* Harvest window (keep prominent) */}
            {ws&&(()=>{
              if(ws.inWindow) return(
                <div style={{background:"#faf5ff",borderRadius:"14px",padding:"16px",border:"1.5px solid #e9d5ff"}}>
                  <div style={{fontSize:"0.7rem",fontWeight:700,color:"#7c3aed",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}}>🌾 Harvest Window Open</div>
                  <div style={{fontSize:"1rem",fontWeight:700,color:"#4c1d95",marginBottom:"4px"}}>Est. maturity {fmtDate(ws.matDate)}{ws.daysPastMat>0?` · ${ws.daysPastMat}d past`:""}</div>
                  <div style={{fontSize:"0.8rem",color:"#7c3aed",marginBottom:"12px"}}>Open since {fmtDate(ws.openDate)} · stays open until marked Done or Lost</div>
                  <button onClick={()=>setShowHarvest(true)} style={{width:"100%",padding:"11px",borderRadius:"10px",border:"none",background:"#8b5cf6",color:"white",fontWeight:700,fontSize:"0.88rem",cursor:"pointer"}}>🌿 Log a Harvest{total?` · ${total.value}${total.unit} total`:""}</button>
                </div>
              );
              if(ws.daysToOpen>0&&ws.daysToOpen<=14) return(
                <div style={{background:"#faf5ff",borderRadius:"14px",padding:"14px",border:"1.5px solid #e9d5ff"}}>
                  <div style={{fontSize:"0.7rem",fontWeight:700,color:"#7c3aed",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"4px"}}>🌾 Harvest Window</div>
                  <div style={{fontSize:"0.92rem",fontWeight:600,color:"#4c1d95"}}>Opens in {ws.daysToOpen} day{ws.daysToOpen!==1?"s":""} · {fmtDate(ws.openDate)}</div>
                  <div style={{fontSize:"0.8rem",color:"#7c3aed",marginTop:"2px"}}>Est. maturity {fmtDate(ws.matDate)}</div>
                </div>
              );
              return(
                <div style={{background:"#f9fafb",borderRadius:"14px",padding:"12px 14px",border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:"0.7rem",fontWeight:700,color:C.textFaint,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"3px"}}>🌾 Harvest Window</div>
                  <div style={{fontSize:"0.9rem",color:C.textSub}}>Opens {fmtDate(ws.openDate)} · est. maturity {fmtDate(ws.matDate)}</div>
                </div>
              );
            })()}

            {/* Succession */}
            {nextSow&&<div style={{background:sowDiff!==null&&sowDiff<=3?"#f0fdf4":"#f9fafb",borderRadius:"14px",padding:"12px 14px",border:`1.5px solid ${sowDiff!==null&&sowDiff<=3?"#86efac":C.border}`}}><div style={{fontSize:"0.7rem",fontWeight:700,color:C.greenMid,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"4px"}}>🌱 Succession</div><div style={{fontSize:"0.92rem",fontWeight:600,color:C.text}}>Next sow: {fmtDate(nextSow)}{sowDiff!==null&&<span style={{marginLeft:"8px",fontSize:"0.82rem",fontWeight:400,color:sowDiff<=0?C.greenMid:sowDiff<=3?"#15803d":C.textSub}}>{sowDiff<=0?"🟢 Sow now!":`in ${sowDiff}d`}</span>}</div></div>}

            {/* Watering */}
            <div style={{background:daysWater!==null&&daysWater>=2?"#eff6ff":"#f9fafb",borderRadius:"14px",border:`1.5px solid ${daysWater!==null&&daysWater>=2?"#93c5fd":C.border}`,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",padding:"14px",gap:"12px"}}>
                <div style={{flex:1}}><div style={{fontSize:"0.7rem",fontWeight:700,color:C.textFaint,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"3px"}}>💧 Watering</div><div style={{fontSize:"0.9rem",fontWeight:600,color:C.text}}>{lastWater?`Last watered ${fmtDate(lastWater.date)}`:"Not yet logged"}</div>{daysWater!==null&&<div style={{fontSize:"0.78rem",color:daysWater>=2?"#1d4ed8":C.greenMid,marginTop:"1px"}}>{daysWater===0?"Watered today":`${daysWater} day${daysWater!==1?"s":""} ago`}</div>}</div>
                <button onClick={()=>onWater(crop.id)} style={{background:"#3b82f6",color:"white",border:"none",borderRadius:"10px",padding:"10px 16px",fontSize:"0.85rem",fontWeight:700,cursor:"pointer",flexShrink:0}}>Watered 💧</button>
              </div>
              {waterLog.length>1&&(
                <div style={{padding:"0 14px 12px"}}>
                  <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.06em",color:C.textFaint,textTransform:"uppercase",marginBottom:"6px"}}>History</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                    {[...waterLog].reverse().slice(1,10).map((w,i)=>(
                      <span key={i} style={{fontSize:"0.72rem",background:"#dbeafe",color:"#1e40af",padding:"3px 8px",borderRadius:"6px",fontWeight:600}}>
                        {fmtMon(w.date)}
                      </span>
                    ))}
                    {waterLog.length>10&&<span style={{fontSize:"0.72rem",color:C.textFaint,padding:"3px 4px",fontStyle:"italic"}}>+{waterLog.length-10} more</span>}
                  </div>
                </div>
              )}
            </div>

            {/* Feeding */}
            <div style={{background:overdue?"#fffbeb":"#f9fafb",borderRadius:"14px",border:`1.5px solid ${overdue?"#fcd34d":C.border}`,overflow:"hidden"}}>
              <div style={{padding:"14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.7rem",fontWeight:700,color:overdue?"#92400e":C.textFaint,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}}>🌿 Feeding</div>
                  {Object.keys(schedules).length===0&&feedLog.length===0&&<div style={{fontSize:"0.88rem",color:C.textSub}}>Log your first feed to set up a per-nutrient schedule.</div>}
                  {Object.entries(schedules).map(([nutrient,sched])=>{const intervalDays=scheduleDays(sched);const last=[...feedLog].reverse().find(f=>f.nutrient===nutrient);const ds=last?daysAgo(last.date):null;const od=ds!==null&&ds>=intervalDays;const dl=intervalDays-(ds||0);return(<div key={nutrient} style={{marginBottom:"6px"}}><div style={{fontSize:"0.88rem",fontWeight:600,color:C.text}}>{nutrient}</div><div style={{fontSize:"0.78rem",color:od?"#b45309":C.greenMid,marginTop:"1px"}}>{od?`⚠ Overdue by ${ds-intervalDays}d · every ${intervalDays}d`:last?`Next in ${dl}d · every ${intervalDays}d · last ${fmtDate(last.date)}`:`Every ${intervalDays}d · not yet fed`}</div></div>);})}
                  {feedLog.length>0&&(()=>{const last=feedLog[feedLog.length-1];const d=daysAgo(last.date);return<div style={{fontSize:"0.82rem",color:C.textSub,marginTop:Object.keys(schedules).length>0?"8px":"0",paddingTop:Object.keys(schedules).length>0?"8px":"0",borderTop:Object.keys(schedules).length>0?`1px solid ${C.border}`:"none"}}>Last fed: <strong style={{color:C.text,fontWeight:600}}>{last.nutrient}</strong>{last.qty?` · ${last.qty}`:""} · {d===0?"today":`${d}d ago`}</div>;})()}
                </div>
                <button onClick={()=>setShowFeed(true)} style={{background:overdue?"#f59e0b":C.green,color:"white",border:"none",borderRadius:"10px",padding:"10px 16px",fontSize:"0.85rem",fontWeight:700,cursor:"pointer",flexShrink:0,marginLeft:"12px"}}>Log Feed</button>
              </div>
              {feedLog.length>0&&(
                <div style={{padding:"0 14px 14px"}}>
                  <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.06em",color:C.textFaint,textTransform:"uppercase",marginBottom:"8px"}}>History</div>
                  <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                    {[...feedLog].reverse().map((fe,revIdx)=>{
                      const realIdx=feedLog.length-1-revIdx;
                      const isEditing=editingFeedIdx===realIdx;
                      return(
                        <div key={realIdx} style={{background:"white",borderRadius:"10px",padding:"10px 12px",border:`1px solid ${C.border}`}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isEditing?"6px":"3px"}}>
                            <span style={{fontSize:"0.72rem",color:C.textFaint}}>{fmtDate(fe.date)}</span>
                            {!isEditing&&(
                              <div style={{display:"flex",gap:"4px"}}>
                                <button onClick={()=>{setEditingFeedIdx(realIdx);setEditFeedData({nutrient:fe.nutrient||"",qty:fe.qty?fe.qty.split(" ")[0]:"",unit:fe.qty?fe.qty.split(" ").slice(1).join(" ")||"tbsp":"tbsp",water:fe.water||""});}} style={{background:"transparent",border:"none",color:C.textSub,fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Edit</button>
                                <button onClick={()=>setDeleteFeedIdx(realIdx)} style={{background:"transparent",border:"none",color:"#dc2626",fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Delete</button>
                              </div>
                            )}
                          </div>
                          {isEditing?(
                            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                              <input value={editFeedData.nutrient} onChange={e=>setEditFeedData(d=>({...d,nutrient:e.target.value}))} placeholder="Nutrient" style={{padding:"8px 10px",borderRadius:"8px",border:`1.5px solid ${C.border}`,fontSize:"0.88rem",outline:"none"}}/>
                              <div style={{display:"flex",gap:"6px"}}>
                                <input type="number" min="0" step="any" value={editFeedData.qty} onChange={e=>setEditFeedData(d=>({...d,qty:e.target.value}))} placeholder="Qty" style={{flex:1,padding:"8px 10px",borderRadius:"8px",border:`1.5px solid ${C.border}`,fontSize:"0.88rem",outline:"none"}}/>
                                <select value={editFeedData.unit} onChange={e=>setEditFeedData(d=>({...d,unit:e.target.value}))} style={{padding:"8px",borderRadius:"8px",border:`1.5px solid ${C.border}`,fontSize:"0.85rem",background:"white"}}>
                                  {FUNITS.map(u=><option key={u}>{u}</option>)}
                                </select>
                              </div>
                              <input value={editFeedData.water} onChange={e=>setEditFeedData(d=>({...d,water:e.target.value}))} placeholder="Water (e.g. 1 gal)" style={{padding:"8px 10px",borderRadius:"8px",border:`1.5px solid ${C.border}`,fontSize:"0.88rem",outline:"none"}}/>
                              <div style={{display:"flex",gap:"6px"}}>
                                <button onClick={()=>{onEditFeed(crop.id,realIdx,{nutrient:titleCase(editFeedData.nutrient.trim()),qty:editFeedData.qty?`${editFeedData.qty} ${editFeedData.unit}`:null,water:editFeedData.water||null});setEditingFeedIdx(null);}} style={{flex:1,background:C.green,color:"white",border:"none",borderRadius:"8px",padding:"8px",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>Save</button>
                                <button onClick={()=>setEditingFeedIdx(null)} style={{flex:1,background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",padding:"8px",fontSize:"0.82rem",color:C.textSub,cursor:"pointer"}}>Cancel</button>
                              </div>
                            </div>
                          ):(
                            <>
                              <div style={{fontSize:"0.88rem",fontWeight:600,color:C.text}}>{fe.nutrient||"—"}</div>
                              <div style={{display:"flex",gap:"5px",marginTop:"3px",flexWrap:"wrap"}}>
                                {fe.qty&&<span style={{fontSize:"0.7rem",fontWeight:600,color:C.greenDark,background:"#dcfce7",padding:"2px 7px",borderRadius:"6px"}}>{fe.qty}</span>}
                                {fe.water&&<span style={{fontSize:"0.7rem",fontWeight:600,color:"#1d4ed8",background:"#dbeafe",padding:"2px 7px",borderRadius:"6px"}}>💧 {fe.water}</span>}
                              </div>
                            </>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
            <ConfirmSheet show={deleteFeedIdx!==null} title="Delete feed entry?" message="This feed log entry will be permanently deleted." confirmLabel="Delete" danger onConfirm={()=>{if(deleteFeedIdx!==null){onDeleteFeed(crop.id,deleteFeedIdx);setDeleteFeedIdx(null);}}} onCancel={()=>setDeleteFeedIdx(null)}/>

            {/* Transplant */}
            <button onClick={()=>setShowTransplant(true)} style={{display:"flex",alignItems:"center",gap:"10px",background:"white",borderRadius:"12px",padding:"12px 14px",border:`1px solid ${C.border}`,cursor:"pointer",textAlign:"left",width:"100%"}}>
              <span style={{fontSize:"1.2rem"}}>📦</span>
              <div style={{flex:1}}><div style={{fontSize:"0.88rem",fontWeight:600,color:C.text}}>Transplant / Move Location</div><div style={{fontSize:"0.75rem",color:C.textSub,marginTop:"2px"}}>Currently in {crop.location}{crop.containerSize?` · ${crop.containerSize}`:""}</div></div>
              <span style={{color:C.textFaint}}>›</span>
            </button>

            {/* Edit */}
            <button onClick={onEdit} style={{width:"100%",padding:"13px",borderRadius:"12px",border:`1.5px solid ${C.border}`,background:"white",fontSize:"0.9rem",fontWeight:600,color:C.text,cursor:"pointer"}}>Edit Crop Details</button>

            {/* Spacer */}
            <div style={{height:"16px"}}/>

            {/* Mark Done / Lost — subtle at bottom */}
            <div style={{display:"flex",gap:"8px",marginTop:"4px"}}>
              <button onClick={()=>setConfirmDone(true)} style={{flex:1,padding:"9px",borderRadius:"10px",border:"none",background:"transparent",fontSize:"0.78rem",fontWeight:500,color:C.textFaint,cursor:"pointer",textDecoration:"underline"}}>Mark as Done</button>
              <button onClick={()=>setConfirmLost(true)} style={{flex:1,padding:"9px",borderRadius:"10px",border:"none",background:"transparent",fontSize:"0.78rem",fontWeight:500,color:C.textFaint,cursor:"pointer",textDecoration:"underline"}}>Mark as Lost</button>
            </div>
          </>
        )}
        {tab==="notes"&&(
          <>
            <div style={{display:"flex",gap:"8px"}}>
              <input value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Add a note..."
                onKeyDown={e=>{if(e.key==="Enter"&&noteText.trim()){onAddNote(crop.id,noteText);setNoteText("");}}}
                style={{flex:1,padding:"12px 14px",borderRadius:"10px",border:`1.5px solid ${C.border}`,fontSize:"0.95rem",background:"white",outline:"none"}}/>
              <button onClick={()=>{if(noteText.trim()){onAddNote(crop.id,noteText);setNoteText("");}}} style={{background:C.green,color:"white",border:"none",borderRadius:"10px",padding:"12px 18px",fontSize:"0.9rem",fontWeight:700,cursor:"pointer"}}>Add</button>
            </div>
            {crop.notes.length===0&&<div style={{textAlign:"center",padding:"2rem 0",color:C.textFaint,fontStyle:"italic"}}>No notes yet.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {crop.notes.map((n,idx)=>n).reverse().map((n,revIdx)=>{
                const realIdx=crop.notes.length-1-revIdx;
                const isEditing=editingNoteIdx===realIdx;
                return(
                  <div key={realIdx} style={{background:"white",borderRadius:"12px",padding:"14px",borderLeft:`3px solid ${n.auto?C.amber:C.green}`}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}}>
                      <div style={{fontSize:"0.72rem",color:C.textFaint}}>{fmtDate(n.date)}
                        {n.auto&&<span style={{display:"none"}}/>}
                        {n.edited&&<span style={{marginLeft:"6px",fontSize:"0.68rem",color:C.textFaint,fontStyle:"italic"}}>edited</span>}
                      </div>
                      {!isEditing&&!n.auto&&(
                        <div style={{display:"flex",gap:"4px"}}>
                          <button onClick={()=>{setEditingNoteIdx(realIdx);setEditingNoteText(n.text);}} style={{background:"transparent",border:"none",color:C.textSub,fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Edit</button>
                          <button onClick={()=>setDeleteNoteIdx(realIdx)} style={{background:"transparent",border:"none",color:"#dc2626",fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Delete</button>
                        </div>
                      )}
                      {n.auto&&(
                        <button onClick={()=>setDeleteNoteIdx(realIdx)} style={{background:"transparent",border:"none",color:C.textFaint,fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Delete</button>
                      )}
                    </div>
                    {isEditing?(
                      <div>
                        <textarea value={editingNoteText} onChange={e=>setEditingNoteText(e.target.value)} autoFocus
                          style={{width:"100%",padding:"10px 12px",borderRadius:"8px",border:`1.5px solid ${C.green}`,fontSize:"0.9rem",outline:"none",resize:"vertical",minHeight:"60px",fontFamily:F.sans}}/>
                        <div style={{display:"flex",gap:"6px",marginTop:"6px"}}>
                          <button onClick={()=>{if(editingNoteText.trim()){onEditNote(crop.id,realIdx,editingNoteText.trim());}setEditingNoteIdx(null);}} style={{background:C.green,color:"white",border:"none",borderRadius:"8px",padding:"6px 14px",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>Save</button>
                          <button onClick={()=>setEditingNoteIdx(null)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",padding:"6px 12px",fontSize:"0.82rem",color:C.textSub,cursor:"pointer"}}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <div style={{fontSize:"0.9rem",color:C.text,lineHeight:1.5}}>{n.text}</div>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}
        {tab==="harvests"&&(
          <>
            {total&&<div style={{background:"#f0fdf4",borderRadius:"12px",padding:"14px",border:"1px solid #bbf7d0",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:"0.82rem",color:C.greenDark,fontWeight:600}}>Total harvested</div><div style={{fontSize:"1.1rem",fontWeight:700,color:C.greenDark}}>{total.value} {total.unit}</div></div>}
            <button onClick={()=>setShowHarvest(true)} style={{width:"100%",padding:"13px",borderRadius:"12px",border:"none",background:"#8b5cf6",color:"white",fontSize:"0.9rem",fontWeight:700,cursor:"pointer"}}>+ Log a Harvest</button>
            {crop.harvests.length===0&&<div style={{textAlign:"center",padding:"2rem 0",color:C.textFaint,fontStyle:"italic"}}>No harvests logged yet.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {crop.harvests.map((h,i)=>h).reverse().map((h,revIdx)=>{
                const realIdx=crop.harvests.length-1-revIdx;
                const isEditing=editingHarvestIdx===realIdx;
                return(
                  <div key={realIdx} style={{background:"white",borderRadius:"12px",padding:"14px",borderLeft:"3px solid #8b5cf6"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}}>
                      <div style={{fontSize:"0.72rem",color:C.textFaint}}>{fmtDate(h.date)}</div>
                      {!isEditing&&(
                        <div style={{display:"flex",gap:"4px"}}>
                          <button onClick={()=>{setEditingHarvestIdx(realIdx);setEditHarvestData({amount:h.amount||"",unit:h.unit||"g",note:h.note||""});}} style={{background:"transparent",border:"none",color:C.textSub,fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Edit</button>
                          <button onClick={()=>setDeleteHarvestIdx(realIdx)} style={{background:"transparent",border:"none",color:"#dc2626",fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Delete</button>
                        </div>
                      )}
                    </div>
                    {isEditing?(
                      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                        <div style={{display:"flex",gap:"6px"}}>
                          <input type="number" value={editHarvestData.amount} onChange={e=>setEditHarvestData(d=>({...d,amount:e.target.value}))} placeholder="Amount"
                            style={{flex:1,padding:"8px 10px",borderRadius:"8px",border:`1.5px solid ${C.border}`,fontSize:"0.88rem",outline:"none"}}/>
                          <select value={editHarvestData.unit} onChange={e=>setEditHarvestData(d=>({...d,unit:e.target.value}))}
                            style={{padding:"8px",borderRadius:"8px",border:`1.5px solid ${C.border}`,fontSize:"0.85rem"}}>
                            {HARVEST_UNITS.map(u=><option key={u}>{u}</option>)}
                          </select>
                        </div>
                        <input value={editHarvestData.note} onChange={e=>setEditHarvestData(d=>({...d,note:e.target.value}))} placeholder="Notes"
                          style={{padding:"8px 10px",borderRadius:"8px",border:`1.5px solid ${C.border}`,fontSize:"0.88rem",outline:"none"}}/>
                        <div style={{display:"flex",gap:"6px"}}>
                          <button onClick={()=>{onEditHarvest(crop.id,realIdx,{amount:editHarvestData.amount?Number(editHarvestData.amount):null,unit:editHarvestData.amount?editHarvestData.unit:null,note:editHarvestData.note||null});setEditingHarvestIdx(null);}} style={{flex:1,background:C.green,color:"white",border:"none",borderRadius:"8px",padding:"8px",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>Save</button>
                          <button onClick={()=>setEditingHarvestIdx(null)} style={{flex:1,background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",padding:"8px",fontSize:"0.82rem",color:C.textSub,cursor:"pointer"}}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <div style={{fontSize:"0.9rem",fontWeight:600,color:C.text}}>{h.amount&&`${h.amount} ${h.unit}`}{h.note&&<span style={{fontWeight:400,color:C.textSub,marginLeft:h.amount?"8px":"0"}}>{h.note}</span>}</div>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    </Panel>
    <FeedLogSheet show={showFeed} crop={crop} allCrops={allCrops} nutrients={nutrients} onAddNutrient={onAddNutrient} onAddFeed={onAddFeed} onEditFeed={onEditFeed} onDeleteFeed={onDeleteFeed} onClose={()=>setShowFeed(false)}/>
    <HarvestLogSheet show={showHarvest} crop={crop} onLog={onLogHarvest} onClose={()=>setShowHarvest(false)}/>
    <TransplantSheet show={showTransplant} crop={crop} locations={locations} onTransplant={onTransplant} onClose={()=>setShowTransplant(false)}/>
    <ConfirmSheet show={confirmDone} title="Mark as Done?" message={`This will archive ${crop.name}${crop.variety?` (${crop.variety})`:""} and remove it from your active crops.`} confirmLabel="Mark Done" onConfirm={()=>{setConfirmDone(false);onMarkDone(crop);}} onCancel={()=>setConfirmDone(false)}/>
    <ConfirmSheet show={confirmLost} title="Mark as Lost?" message={`This will archive ${crop.name}${crop.variety?` (${crop.variety})`:""} as a loss.`} confirmLabel="Mark Lost" danger onConfirm={()=>{setConfirmLost(false);onMarkLost(crop);}} onCancel={()=>setConfirmLost(false)}/>
    <ConfirmSheet show={deleteNoteIdx!==null} title="Delete note?" message="This note will be permanently deleted." confirmLabel="Delete" danger onConfirm={()=>{if(deleteNoteIdx!==null){onDeleteNote(crop.id,deleteNoteIdx);setDeleteNoteIdx(null);}}} onCancel={()=>setDeleteNoteIdx(null)}/>
    <ConfirmSheet show={deleteHarvestIdx!==null} title="Delete harvest?" message="This harvest entry will be permanently deleted and removed from your totals." confirmLabel="Delete" danger onConfirm={()=>{if(deleteHarvestIdx!==null){onDeleteHarvest(crop.id,deleteHarvestIdx);setDeleteHarvestIdx(null);}}} onCancel={()=>setDeleteHarvestIdx(null)}/>
    </>
  );
}

// ── Crop Card ──────────────────────────────────────────────────
function CropCard({crop,onClick,onWater}) {
  const acc=cropAccent(crop.name);
  const sc=STAGE_COLORS[crop.stage]||STAGE_COLORS.Seedling;
  const schedules=crop.feedSchedules||{};
  const feedLog=crop.feedLog||[];
  const waterLog=crop.waterLog||[];
  const overdue=Object.entries(schedules).some(([n,d])=>{const l=[...feedLog].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);});
  const ws=hwStatus(crop);
  const nextSow=crop.successionDays?succDate(crop.seedDate,crop.successionDays):null;
  const sowSoon=nextSow&&daysUntil(nextSow)<=3;
  const lastWater=waterLog.length?waterLog[waterLog.length-1]:null;
  const daysWater=lastWater?daysAgo(lastWater.date):null;
  const lastFeed=feedLog.length?feedLog[feedLog.length-1]:null;
  const daysFed=lastFeed?daysAgo(lastFeed.date):null;
  const dInStage=daysSinceStage(crop);
  const timeLabel=crop.seedDate?`${weeksAgo(crop.seedDate)}w since start`:"—";
  const estHarvest=harvestFmt(crop.startType==="direct"?crop.seedDate:(crop.transplantDate||crop.seedDate),crop.daysToMaturity);
  return(
    <div style={{background:"white",borderRadius:"16px",overflow:"hidden",border:`1.5px solid ${ws?.inWindow?"#c4b5fd":overdue?"#fcd34d":C.border}`,boxShadow:ws?.inWindow?"0 2px 12px rgba(139,92,246,0.12)":"0 1px 6px rgba(0,0,0,0.06)",userSelect:"none"}}>
      <div style={{height:"4px",background:`linear-gradient(to right,${acc.from},${acc.to})`}}/>
      <div onClick={onClick} style={{padding:"12px 14px",cursor:"pointer"}}>
        <div style={{marginBottom:"8px"}}>
          <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.1em",color:C.textFaint,textTransform:"uppercase",marginBottom:"2px"}}>{crop.name}</div>
          <div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"1.05rem",color:C.text,lineHeight:1.2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{crop.variety||<span style={{color:C.textFaint,fontStyle:"normal",fontFamily:F.sans,fontSize:"0.9rem"}}>No variety</span>}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:sc.dot,flexShrink:0}}/>
          <span style={{fontSize:"0.82rem",fontWeight:700,color:sc.text}}>{crop.stage}</span>
          {dInStage!==null&&<span style={{fontSize:"0.75rem",color:C.textFaint}}>· {dInStage}d in stage</span>}
        </div>
        {estHarvest&&<div style={{fontSize:"0.75rem",color:ws?.inWindow?"#7c3aed":C.textSub,marginBottom:"4px",fontWeight:ws?.inWindow?700:500}}>🌾 Est. harvest: {estHarvest}{ws&&!ws.inWindow&&ws.daysToOpen>0?` · in ${ws.daysToOpen}d`:""}{ws?.inWindow?" · window open":""}</div>}
        {lastFeed&&<div style={{fontSize:"0.72rem",color:C.textSub,marginBottom:"4px"}}>🌿 Last fed: <strong style={{color:C.text,fontWeight:600}}>{lastFeed.nutrient}</strong> · {daysFed===0?"today":`${daysFed}d ago`}</div>}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:"0.72rem",color:C.textFaint}}>{timeLabel}{crop.containerSize?` · ${crop.containerSize}`:""}</div>
          <div style={{fontSize:"0.9rem",lineHeight:1}}>{overdue?"⚠️":""}{sowSoon?"🔔":""}</div>
        </div>
      </div>
      <div style={{borderTop:`1px solid #f3f4f6`,padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fafafa"}}>
        <span style={{fontSize:"0.75rem",color:daysWater===0?"#15803d":daysWater!==null?C.textSub:C.textFaint}}>{daysWater===null?"Never watered":daysWater===0?"Watered today":`Watered ${daysWater}d ago`}</span>
        {onWater&&<button onClick={e=>{e.stopPropagation();onWater(crop.id);}} style={{background:"#eff6ff",border:"none",borderRadius:"8px",padding:"5px 12px",fontSize:"0.75rem",fontWeight:600,color:"#1d4ed8",cursor:"pointer"}}>💧 Watered</button>}
      </div>
    </div>
  );
}

// ── Todo Panel ─────────────────────────────────────────────────
function TodoPanel({show,crops,todos,onAddTodo,onToggleTodo,onDeleteTodo,onClose}) {
  const [text,setText]=useState("");
  const [due,setDue]=useState("");
  const [confirmDelete,setConfirmDelete]=useState(null);
  const t0=todayStr();
  function genTasks(){
    const tasks=[];
    crops.filter(c=>!c.archived).forEach(c=>{
      const s=c.feedSchedules||{};const fl=c.feedLog||[];
      Object.entries(s).forEach(([nutrient,d])=>{
        const last=[...fl].reverse().find(f=>f.nutrient===nutrient);if(!last)return;
        const da=daysAgo(last.date);
        if(da>=d) tasks.push({id:`feed-${c.id}-${nutrient}`,type:"feed",label:`Feed ${c.name}${c.variety?` · ${c.variety}`:""} — ${nutrient}`,sub:`${da-d}d overdue`,urgency:"overdue",crop:c});
        else if(d-da<=3) tasks.push({id:`feed-${c.id}-${nutrient}`,type:"feed",label:`Feed ${c.name}${c.variety?` · ${c.variety}`:""} — ${nutrient}`,sub:`Due in ${d-da}d`,urgency:"soon",crop:c});
      });
      const ws=hwStatus(c);
      if(ws?.inWindow) tasks.push({id:`hw-${c.id}`,type:"harvest",label:`Harvest ${c.name}${c.variety?` · ${c.variety}`:""}`,sub:"Window open · mark Done when finished",urgency:"today",crop:c});
      else if(ws&&ws.daysToOpen<=5&&ws.daysToOpen>0) tasks.push({id:`hw-${c.id}`,type:"harvest",label:`Harvest window opens: ${c.name}`,sub:`In ${ws.daysToOpen}d · ${fmtDate(ws.openDate)}`,urgency:"soon",crop:c});
      if(c.successionDays){const diff=daysUntil(succDate(c.seedDate,c.successionDays));if(diff!==null&&diff<=7) tasks.push({id:`suc-${c.id}`,type:"succession",label:`Succession sow ${c.name}${c.variety?` · ${c.variety}`:""}`,sub:diff<=0?"Sow now!":`Sow in ${diff}d`,urgency:diff<=0?"overdue":"today",crop:c});}
    });
    return tasks.sort((a,b)=>({overdue:0,today:1,soon:2}[a.urgency]-{overdue:0,today:1,soon:2}[b.urgency]));
  }
  const tasks=genTasks();
  const pending=todos.filter(t=>!t.done).sort((a,b)=>{
    // Both have dates — sort oldest first
    if(a.due&&b.due) return a.due.localeCompare(b.due);
    // Only a has date — a comes first
    if(a.due&&!b.due) return -1;
    // Only b has date — b comes first
    if(!a.due&&b.due) return 1;
    // Neither has date — keep insertion order
    return 0;
  });
  const done=todos.filter(t=>t.done);
  const uc={overdue:{bg:"#fffbeb",border:"#fcd34d",dot:"#f59e0b",text:"#92400e"},today:{bg:"#eff6ff",border:"#bfdbfe",dot:"#3b82f6",text:"#1e40af"},soon:{bg:"#f9fafb",border:C.border,dot:"#9ca3af",text:C.textSub}};
  const icon={feed:"🌿",harvest:"🌾",succession:"🌱"};
  return(
    <>
    <Panel show={show} onClose={onClose} title="To-Do" bottomBack>
      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:"20px"}}>
        {tasks.length>0&&(
          <div>
            <SLabel>Crop Schedule</SLabel>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {tasks.map(t=>{const u=uc[t.urgency];const acc=cropAccent(t.crop.name);return(
                <div key={t.id} style={{display:"flex",gap:"10px",alignItems:"center",background:u.bg,borderRadius:"12px",padding:"12px 14px",border:`1.5px solid ${u.border}`}}>
                  <div style={{width:"8px",height:"8px",borderRadius:"50%",background:u.dot,flexShrink:0}}/>
                  <div style={{flex:1}}><div style={{fontSize:"0.9rem",fontWeight:600,color:C.text}} dangerouslySetInnerHTML={{__html:`${icon[t.type]} ${t.label}`}}/><div style={{fontSize:"0.78rem",color:u.text,marginTop:"2px"}}>{t.sub}</div></div>
                  <div style={{width:"3px",alignSelf:"stretch",borderRadius:"2px",background:`linear-gradient(${acc.from},${acc.to})`,flexShrink:0}}/>
                </div>
              );})}
            </div>
          </div>
        )}
        <div>
          <SLabel>My Tasks</SLabel>
          <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"10px"}}>
            <div>
              <div style={{fontSize:"0.72rem",fontWeight:600,color:C.textSub,marginBottom:"5px",letterSpacing:"0.04em",textTransform:"uppercase"}}>Task</div>
              <input value={text} onChange={e=>setText(e.target.value)} placeholder="What needs to be done?"
                onKeyDown={e=>{if(e.key==="Enter"&&text.trim()){onAddTodo({id:nextTodo++,text:text.trim(),done:false,due:due||null});setText("");setDue("");}}}
                style={{width:"100%",padding:"12px 14px",borderRadius:"10px",border:`1.5px solid ${C.border}`,fontSize:"0.95rem",background:"white",outline:"none"}}/>
            </div>
            <div>
              <div style={{fontSize:"0.72rem",fontWeight:600,color:C.textSub,marginBottom:"5px",letterSpacing:"0.04em",textTransform:"uppercase"}}>Finish By <span style={{fontWeight:400,color:C.textFaint}}>(optional)</span></div>
              <input type="date" value={due} onChange={e=>setDue(e.target.value)} style={{width:"100%",padding:"12px 14px",borderRadius:"10px",border:`1.5px solid ${C.border}`,fontSize:"0.95rem",background:"white",outline:"none",color:due?C.text:C.textFaint}}/>
            </div>
            <button onClick={()=>{if(text.trim()){onAddTodo({id:nextTodo++,text:text.trim(),done:false,due:due||null});setText("");setDue("");}}} style={{background:C.green,color:"white",border:"none",borderRadius:"10px",padding:"13px",fontWeight:700,fontSize:"0.95rem",cursor:"pointer"}}>Add Task</button>
          </div>
          {pending.length===0&&tasks.length===0&&<div style={{textAlign:"center",padding:"1.5rem",color:C.textFaint,fontStyle:"italic",fontSize:"0.9rem"}}>You're all caught up!</div>}
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {pending.map(t=>{const ov=t.due&&t.due<t0;const di=t.due?daysUntil(t.due):null;return(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:"12px",background:ov?"#fffbeb":"white",borderRadius:"12px",padding:"12px 14px",border:`1.5px solid ${ov?"#fcd34d":C.border}`}}>
                <div onClick={()=>onToggleTodo(t.id)} className="cb"/>
                <div style={{flex:1}}><div style={{fontSize:"0.9rem",fontWeight:500,color:C.text}}>{t.text}</div>{t.due&&<div style={{fontSize:"0.75rem",color:ov?"#92400e":C.textFaint,marginTop:"2px"}}>{ov?`⚠ Due ${fmtDate(t.due)}`:di===0?"Due today":`Due ${fmtDate(t.due)}`}</div>}</div>
                <button onClick={()=>setConfirmDelete(t)} style={{background:"transparent",border:"none",color:"#d1d5db",fontSize:"1.1rem",cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
              </div>
            );})}
          </div>
          {done.length>0&&(
            <div style={{marginTop:"12px"}}>
              <SLabel>Completed ({done.length})</SLabel>
              {done.map(t=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:"12px",background:"#f9fafb",borderRadius:"12px",padding:"10px 14px",opacity:0.65,marginBottom:"6px"}}>
                  <div onClick={()=>onToggleTodo(t.id)} className="cb checked"><span style={{color:"white",fontSize:"0.8rem"}}>✓</span></div>
                  <div style={{flex:1,fontSize:"0.9rem",color:C.textSub,textDecoration:"line-through"}}>{t.text}</div>
                  <button onClick={()=>setConfirmDelete(t)} style={{background:"transparent",border:"none",color:"#d1d5db",fontSize:"1.1rem",cursor:"pointer",padding:"0"}}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </Panel>
    <ConfirmSheet show={!!confirmDelete} title="Delete task?" message={confirmDelete?`"${confirmDelete.text}" will be permanently deleted.`:""} confirmLabel="Delete" danger onConfirm={()=>{if(confirmDelete){onDeleteTodo(confirmDelete.id);setConfirmDelete(null);}}} onCancel={()=>setConfirmDelete(null)}/>
    </>
  );
}

// ── Weather Panel ──────────────────────────────────────────────
function WeatherPanel({show,weatherData,location,loading,error,onRefresh,onClose}) {
  if(!show) return null;
  const today=weatherData?.today;
  const forecast=weatherData?.forecast||[];
  // Day-of-week label helper
  const dayLabel=(dateStr,i)=>{
    if(i===0) return "Tomorrow";
    const d=new Date(dateStr+"T12:00:00");
    return d.toLocaleDateString("en-US",{weekday:"long"});
  };
  return(
    <Panel show={show} onClose={onClose} title="Weather">
      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:"14px"}}>
        {loading&&<div style={{textAlign:"center",padding:"3rem 0",color:C.textFaint}}>Fetching weather…</div>}
        {error&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:"12px",padding:"14px",fontSize:"0.85rem",color:"#991b1b"}}>{error}<div style={{marginTop:"8px"}}><button onClick={onRefresh} style={{background:"#ef4444",color:"white",border:"none",borderRadius:"8px",padding:"6px 14px",fontSize:"0.82rem",fontWeight:600,cursor:"pointer"}}>Retry</button></div></div>}
        {today&&(
          <div style={{background:`linear-gradient(135deg,#0ea5e9,#1e40af)`,borderRadius:"18px",padding:"22px 20px",color:"white",boxShadow:"0 4px 20px rgba(14,165,233,0.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>
              <div>
                <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.14em",opacity:0.7,textTransform:"uppercase",marginBottom:"2px"}}>Today</div>
                <div style={{fontSize:"0.88rem",fontWeight:600,opacity:0.9,marginBottom:"3px"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
                {location&&<div style={{fontSize:"0.82rem",opacity:0.75,fontWeight:500}}>📍 {location.city}, {location.state}</div>}
              </div>
              <div style={{fontSize:"3rem",lineHeight:1}}>{today.info.emoji}</div>
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:"12px",marginBottom:"4px"}}>
              <div style={{fontSize:"3.4rem",fontWeight:700,lineHeight:1}}>{Math.round(today.currentTemp)}°</div>
              <div style={{display:"flex",flexDirection:"column",gap:"2px"}}>
                <div style={{fontSize:"0.82rem",opacity:0.9}}>High <strong>{Math.round(today.high)}°</strong></div>
                <div style={{fontSize:"0.82rem",opacity:0.9}}>Low <strong>{Math.round(today.low)}°</strong></div>
              </div>
            </div>
            {today.feelsLike!=null&&<div style={{fontSize:"0.82rem",opacity:0.8,marginBottom:"10px"}}>Feels like {Math.round(today.feelsLike)}°</div>}
            <div style={{fontSize:"1rem",fontWeight:600,marginBottom:"14px"}}>{today.info.label}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px",fontSize:"0.78rem"}}>
              <div style={{background:"rgba(255,255,255,0.15)",borderRadius:"8px",padding:"5px 10px"}}>💧 {Math.round(today.humidity)}% humidity</div>
              {today.dewPoint!=null&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:"8px",padding:"5px 10px"}}>🌡 {Math.round(today.dewPoint)}° dew point</div>}
              {today.wind!=null&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:"8px",padding:"5px 10px"}}>💨 {Math.round(today.wind)} mph wind</div>}
              {today.windGusts!=null&&today.windGusts>today.wind&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:"8px",padding:"5px 10px"}}>💨 {Math.round(today.windGusts)} mph gusts</div>}
              {today.uvIndex!=null&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:"8px",padding:"5px 10px"}}>☀️ UV {Math.round(today.uvIndex)}{today.uvIndex>=8?" (very high)":today.uvIndex>=6?" (high)":today.uvIndex>=3?" (moderate)":""}</div>}
              {today.precipProb>0&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:"8px",padding:"5px 10px"}}>☔ {today.precipProb}% rain</div>}
              {today.precip>0&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:"8px",padding:"5px 10px"}}>{today.precip.toFixed(2)}" precip</div>}
            </div>
          </div>
        )}
        {forecast.length>0&&(
          <>
            <SLabel>7-Day Forecast</SLabel>
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
              {forecast.map((w,i)=>{
                const hasRain=w.precipProb>20||w.precip>0;
                const d=parseDate(w.date);
                const dateLabel=d.toLocaleDateString("en-US",{weekday:"long"});
                const dateShort=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
                return(
                  <div key={w.date} style={{display:"flex",alignItems:"center",gap:"12px",background:"white",borderRadius:"12px",padding:"12px 14px",border:`1px solid ${hasRain?"#bfdbfe":C.border}`}}>
                    <div style={{fontSize:"1.4rem",flexShrink:0,lineHeight:1}}>{w.info.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:"6px"}}>
                        <div style={{fontSize:"0.88rem",fontWeight:700,color:C.text}}>{i===0?"Tomorrow":dateLabel}</div>
                        <div style={{fontSize:"0.72rem",color:C.textFaint}}>{dateShort}</div>
                      </div>
                      <div style={{fontSize:"0.72rem",color:C.textSub,marginTop:"1px"}}>{w.info.label}</div>
                      {hasRain&&<div style={{fontSize:"0.72rem",color:"#2563eb",fontWeight:600,marginTop:"2px"}}>☔ {w.precipProb}% · {w.precip.toFixed(2)}"</div>}
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:"1rem",fontWeight:700,color:"#ea580c"}}>{Math.round(w.high)}°</div>
                      <div style={{fontSize:"0.78rem",color:C.textFaint}}>{Math.round(w.low)}°</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}
        {!loading&&!error&&!today&&<div style={{textAlign:"center",padding:"2rem",color:C.textFaint,fontStyle:"italic"}}>Set your ZIP code in Settings to enable weather.</div>}
      </div>
    </Panel>
  );
}

// ── Report Panel ───────────────────────────────────────────────
function ReportPanel({show,crops,onRestore,onClose}) {
  const [sec,setSec]=useState("overview");
  const [confirmRestore,setConfirmRestore]=useState(null);
  const active=crops.filter(c=>!c.archived);
  const archived=crops.filter(c=>c.archived);
  const allHarvests=crops.flatMap(c=>c.harvests.map(h=>({...h,cropName:c.name,variety:c.variety,cropId:c.id})));
  const harvestByCrop=crops.filter(c=>c.harvests.length>0).map(c=>{const t=harvestTotal(c);return{name:c.name,variety:c.variety,count:c.harvests.length,total:t};}).sort((a,b)=>(b.total?.value||0)-(a.total?.value||0));
  const tabs=[["overview","Overview"],["harvests","Harvests"],["feeding","Feeding"],["watering","Watering"]];

      </div>

        {sec==="overview"&&(
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              <div style={{background:"white",borderRadius:"14px",padding:"18px 14px",textAlign:"center",border:`1.5px solid ${C.border}`}}>
                <div style={{fontSize:"2rem",fontWeight:700,color:C.greenDark,lineHeight:1}}>{active.length}</div>
                <div style={{fontSize:"0.75rem",fontWeight:600,color:C.textSub,marginTop:"6px",letterSpacing:"0.06em",textTransform:"uppercase"}}>Active Crops</div>
              </div>
              <div onClick={archived.length>0?()=>setSec("archived"):undefined} style={{background:"white",borderRadius:"14px",padding:"18px 14px",textAlign:"center",border:`1.5px solid ${archived.length>0?C.green:C.border}`,cursor:archived.length>0?"pointer":"default"}}>
                <div style={{fontSize:"2rem",fontWeight:700,color:archived.length>0?C.greenMid:C.textFaint,lineHeight:1}}>{archived.length}{archived.length>0&&<span style={{fontSize:"0.85rem",marginLeft:"6px",fontWeight:500}}>›</span>}</div>
                <div style={{fontSize:"0.75rem",fontWeight:600,color:C.textSub,marginTop:"6px",letterSpacing:"0.06em",textTransform:"uppercase"}}>Archived Crops</div>
              </div>
            </div>
            {archived.length>0&&<div style={{fontSize:"0.78rem",color:C.textFaint,textAlign:"center",fontStyle:"italic",marginTop:"4px"}}>Tap Archived Crops to view and restore past crops</div>}
            {(()=>{
              const byStage=STAGES.filter(s=>s!=="Done"&&s!=="Lost").map(s=>({stage:s,count:active.filter(c=>c.stage===s).length})).filter(x=>x.count>0);
              if(!byStage.length) return null;
              return(
                <div style={{background:"white",borderRadius:"14px",padding:"16px",border:`1px solid ${C.border}`,marginTop:"8px"}}>
                  <SLabel mt="0">Crops by Stage</SLabel>
                  <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                    {byStage.map(({stage,count})=>{
                      const sc=STAGE_COLORS[stage];
                      const pct=Math.round((count/active.length)*100);
                      return(
                        <div key={stage} style={{display:"flex",alignItems:"center",gap:"12px"}}>
                          <div style={{width:"10px",height:"10px",borderRadius:"50%",background:sc.dot,flexShrink:0}}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                              <span style={{fontSize:"0.85rem",fontWeight:600,color:C.text}}>{stage}</span>
                              <span style={{fontSize:"0.82rem",fontWeight:700,color:C.textSub}}>{count}</span>
                            </div>
                            <div style={{height:"6px",background:"#f3f4f6",borderRadius:"3px",overflow:"hidden"}}>
                              <div style={{width:`${pct}%`,height:"100%",background:sc.dot,borderRadius:"3px"}}/>

                          </div>

                    })}
